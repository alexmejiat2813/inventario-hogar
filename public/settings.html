<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b; min-height: 100vh; padding-bottom: 4rem;
    }
    button, input, select, a { font: inherit; cursor: pointer; text-decoration: none; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
    }
    .header-inner {
      max-width: 960px; margin: 0 auto; padding: .875rem 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem; background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px; font-size: .8rem; font-weight: 600; white-space: nowrap;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .header-title { flex: 1; font-size: 1.05rem; font-weight: 800; }

    /* Tabs */
    .tabs-bar {
      background: white; border-bottom: 1.5px solid #e2e8f0;
      position: sticky; top: 52px; z-index: 90;
    }
    .tabs-inner {
      max-width: 960px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: .75rem 1.25rem; background: none; border: none;
      font-size: .875rem; font-weight: 600; color: #64748b;
      border-bottom: 2.5px solid transparent; white-space: nowrap;
      transition: color .15s, border-color .15s; flex-shrink: 0;
    }
    .tab-btn:hover { color: #2563eb; }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }

    /* Content */
    .content { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* Section header */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .section-title { font-size: 1.1rem; font-weight: 800; }
    .section-link {
      font-size: .875rem; font-weight: 600; color: #2563eb;
      display: flex; align-items: center; gap: .3rem;
    }
    .section-link:hover { text-decoration: underline; }

    /* Button group */
    .btn {
      display: inline-flex; align-items: center; gap: .375rem;
      padding: .5rem 1rem; border: none; border-radius: 8px;
      font-size: .875rem; font-weight: 600;
      transition: background .15s; white-space: nowrap;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
    .btn-edit { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-edit:hover { background: #e2e8f0; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: none; }
    .btn-delete:hover { background: #fecaca; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left; padding: .625rem 1rem;
      font-size: .72rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 1.5px solid #e2e8f0; background: #f8fafc;
    }
    .data-table td {
      padding: .75rem 1rem; font-size: .875rem;
      border-bottom: 1px solid #f1f5f9; vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafafa; }
    .table-wrap {
      background: white; border-radius: 14px;
      border: 1.5px solid #e2e8f0; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .col-emoji { font-size: 1.2rem; }
    .col-actions { display: flex; gap: .5rem; justify-content: flex-end; }
    .type-badge {
      display: inline-block; padding: .2rem .55rem;
      border-radius: 999px; font-size: .72rem; font-weight: 600;
    }
    .type-peso    { background: #fef3c7; color: #92400e; }
    .type-volumen { background: #dbeafe; color: #1e40af; }
    .type-cantidad{ background: #dcfce7; color: #166534; }

    .empty-row td { text-align: center; color: #94a3b8; padding: 2.5rem 1rem; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.5);
      backdrop-filter: blur(3px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fade-in .15s ease;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; padding: 1rem; } }
    @keyframes fade-in { from{opacity:0} to{opacity:1} }
    .modal {
      background: white; border-radius: 18px 18px 0 0;
      width: 100%; max-width: 400px; padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: slide-up .22s cubic-bezier(.34,1.56,.64,1);
    }
    @media (min-width: 600px) { .modal { border-radius: 18px; animation: scale-in .18s ease; } }
    @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes scale-in { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: .75rem; margin-bottom: 1.25rem;
    }
    .modal-title { font-size: 1.05rem; font-weight: 800; }
    .modal-close {
      width: 32px; height: 32px; flex-shrink: 0; border: none;
      border-radius: 50%; background: #f1f5f9; color: #64748b;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #e2e8f0; }
    .form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .form-label { font-size: .85rem; font-weight: 600; }
    .form-input, .form-select {
      padding: .55rem .8rem; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: .9375rem; color: #1e293b;
      background: white; transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-input::placeholder { color: #94a3b8; }
    .form-input.invalid, .form-select.invalid { border-color: #dc2626; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .modal-footer { display: flex; gap: .625rem; margin-top: .25rem; }
    .btn-cancel {
      flex: 1; padding: .6rem; background: #f1f5f9; color: #475569;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 600;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-save {
      flex: 2; padding: .6rem; background: #2563eb; color: white;
      border: none; border-radius: 8px; font-size: .9rem; font-weight: 700;
    }
    .btn-save:hover { background: #1d4ed8; }
    .btn-save:disabled { opacity: .6; }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 300;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show   { opacity: 1; transform: translateY(0); }
    .toast-success { background: #16a34a; }
    .toast-error   { background: #dc2626; }
    .toast-info    { background: #2563eb; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventories" class="btn-back" id="settings-back-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="settings.back">Atrás</span>
      </a>
      <h1 class="header-title" data-i18n="settings.title">Configuración</h1>
    </div>
  </header>

  <div class="tabs-bar">
    <div class="tabs-inner">
      <button class="tab-btn active" data-tab="categories" data-i18n="settings.tabs.categories">Categorías</button>
      <button class="tab-btn"        data-tab="units"      data-i18n="settings.tabs.units">Unidades</button>
      <button class="tab-btn"        data-tab="catalog"    data-i18n="settings.tabs.catalog">Catálogo</button>
    </div>
  </div>

  <!-- ══ Tab: Categorías ══ -->
  <div class="content" id="tab-categories">
    <div class="section-head">
      <h2 class="section-title" data-i18n="settings.categories.title">Categorías</h2>
      <button class="btn btn-primary btn-sm" id="btn-add-category">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="settings.categories.add">+ Agregar categoría</span>
      </button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th data-i18n="settings.categories.colEmoji">Icono</th>
            <th data-i18n="settings.categories.colName">Nombre</th>
            <th data-i18n="settings.categories.colActions">Acciones</th>
          </tr>
        </thead>
        <tbody id="categories-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ══ Tab: Unidades ══ -->
  <div class="content" id="tab-units" hidden>
    <div class="section-head">
      <h2 class="section-title" data-i18n="settings.units.title">Unidades de medida</h2>
      <button class="btn btn-primary btn-sm" id="btn-add-unit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="settings.units.add">+ Agregar unidad</span>
      </button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th data-i18n="settings.units.colName">Nombre</th>
            <th data-i18n="settings.units.colAbbr">Abreviación</th>
            <th data-i18n="settings.units.colType">Tipo</th>
            <th data-i18n="settings.units.colActions">Acciones</th>
          </tr>
        </thead>
        <tbody id="units-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ══ Tab: Catálogo ══ -->
  <div class="content" id="tab-catalog" hidden>
    <div class="section-head">
      <h2 class="section-title" data-i18n="settings.catalog.title">Productos del catálogo</h2>
      <a href="/catalog" class="section-link" data-i18n="settings.catalog.viewAll">Ver catálogo completo →</a>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th data-i18n="settings.catalog.colName">Nombre</th>
            <th data-i18n="settings.catalog.colCategory">Categoría</th>
            <th data-i18n="settings.catalog.colActions">Acciones</th>
          </tr>
        </thead>
        <tbody id="catalog-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal: Categoría -->
  <div class="modal-overlay" id="cat-modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="cat-modal-title" data-i18n="settings.categories.modal.addTitle">Agregar categoría</h2>
        <button class="modal-close" id="cat-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="cat-form" novalidate>
        <input type="hidden" id="cat-id">
        <div class="form-row">
          <div class="form-group" style="grid-column:1/span 2">
            <label class="form-label" for="cat-name-input" data-i18n="settings.categories.modal.name">Nombre</label>
            <input class="form-input" type="text" id="cat-name-input"
                   data-i18n-ph="settings.categories.modal.namePlaceholder"
                   placeholder="Ej: Frutas" maxlength="60" required autocomplete="off">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="cat-emoji-input" data-i18n="settings.categories.modal.emoji">Emoji</label>
          <input class="form-input" type="text" id="cat-emoji-input"
                 data-i18n-ph="settings.categories.modal.emojiPlaceholder"
                 placeholder="🍎" maxlength="4" autocomplete="off">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="cat-modal-cancel" data-i18n="settings.categories.modal.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="cat-modal-save"   data-i18n="settings.categories.modal.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Unidad -->
  <div class="modal-overlay" id="unit-modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="unit-modal-title" data-i18n="settings.units.modal.addTitle">Agregar unidad</h2>
        <button class="modal-close" id="unit-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="unit-form" novalidate>
        <input type="hidden" id="unit-id">
        <div class="form-group">
          <label class="form-label" for="unit-name-input" data-i18n="settings.units.modal.name">Nombre</label>
          <input class="form-input" type="text" id="unit-name-input"
                 data-i18n-ph="settings.units.modal.namePlaceholder"
                 placeholder="Ej: kilogramos" maxlength="60" required autocomplete="off">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="unit-abbr-input" data-i18n="settings.units.modal.abbreviation">Abreviación</label>
            <input class="form-input" type="text" id="unit-abbr-input"
                   data-i18n-ph="settings.units.modal.abbreviationPlaceholder"
                   placeholder="Ej: kg" maxlength="10" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="unit-type-select" data-i18n="settings.units.modal.type">Tipo</label>
            <select class="form-select" id="unit-type-select" required>
              <option value="peso"    data-i18n="settings.units.types.peso">Peso</option>
              <option value="volumen" data-i18n="settings.units.types.volumen">Volumen</option>
              <option value="cantidad" data-i18n="settings.units.types.cantidad" selected>Cantidad</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="unit-modal-cancel" data-i18n="settings.units.modal.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="unit-modal-save"   data-i18n="settings.units.modal.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Producto del catálogo -->
  <div class="modal-overlay" id="cp-modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" data-i18n="settings.catalog.modal.editTitle">Editar producto</h2>
        <button class="modal-close" id="cp-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="cp-form" novalidate>
        <input type="hidden" id="cp-id">
        <div class="form-group">
          <label class="form-label" for="cp-name-input" data-i18n="settings.catalog.modal.name">Nombre del producto</label>
          <input class="form-input" type="text" id="cp-name-input" maxlength="100" required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="cp-cat-select" data-i18n="settings.catalog.modal.category">Categoría</label>
          <select class="form-select" id="cp-cat-select" required>
            <option value="Alimentos">🍎 Alimentos</option>
            <option value="Bebidas">🥤 Bebidas</option>
            <option value="Aseo Personal">🧴 Aseo Personal</option>
            <option value="Aseo del Hogar">🧹 Aseo del Hogar</option>
            <option value="Alacena">🫙 Alacena</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="cp-modal-cancel" data-i18n="settings.catalog.modal.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="cp-modal-save"   data-i18n="settings.catalog.modal.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
