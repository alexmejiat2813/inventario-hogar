<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b; min-height: 100vh;
      padding-bottom: 4rem;
    }
    button, input, select { font: inherit; cursor: pointer; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      padding: .875rem 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .8rem; font-weight: 600; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .header-title {
      flex: 1; font-size: 1.05rem; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-add-catalog {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .45rem .875rem;
      background: rgba(255,255,255,.15); color: white;
      border: 1.5px solid rgba(255,255,255,.3); border-radius: 8px;
      font-size: .82rem; font-weight: 700;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-add-catalog:hover { background: rgba(255,255,255,.28); }

    /* ── Search + filters ── */
    .controls {
      max-width: 960px; margin: 0 auto;
      padding: 1rem 1rem .5rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
      color: #94a3b8; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: .65rem .75rem .65rem 2.25rem;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: .9375rem; background: white; color: #1e293b;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .search-input::placeholder { color: #94a3b8; }

    .tabs-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .tabs-wrap {
      display: flex; gap: .375rem;
      white-space: nowrap; padding: 0 0 2px;
    }
    .tab-btn {
      padding: .4rem .875rem; border: 1.5px solid #e2e8f0;
      border-radius: 999px; background: white;
      font-size: .82rem; font-weight: 600; color: #64748b;
      transition: all .15s; flex-shrink: 0;
    }
    .tab-btn:hover { border-color: #93c5fd; color: #1d4ed8; background: #eff6ff; }
    .tab-btn.active {
      background: #2563eb; border-color: #2563eb;
      color: white; box-shadow: 0 2px 6px rgba(37,99,235,.3);
    }

    /* ── Count line ── */
    .catalog-count {
      max-width: 960px; margin: 0 auto;
      padding: .375rem 1rem .25rem;
      font-size: .8rem; color: #94a3b8; font-weight: 500;
    }

    /* ── Product grid ── */
    .catalog-grid {
      max-width: 960px; margin: 0 auto;
      padding: .5rem 1rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .75rem;
    }
    @media (min-width: 480px)  { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 640px)  { .catalog-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 860px)  { .catalog-grid { grid-template-columns: repeat(5, 1fr); } }

    /* ── Product card ── */
    .cat-card {
      background: white; border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      padding: 1rem .875rem .875rem;
      display: flex; flex-direction: column; gap: .5rem;
      animation: card-in .2s ease both;
      transition: box-shadow .18s, transform .18s, border-color .18s;
    }
    .cat-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-2px); border-color: #bfdbfe; }
    @keyframes card-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .card-icon {
      font-size: 1.75rem; line-height: 1;
      margin-bottom: .1rem;
    }
    .card-name {
      font-size: .875rem; font-weight: 700; color: #1e293b;
      line-height: 1.3;
    }
    .card-meta {
      font-size: .72rem; color: #94a3b8; font-weight: 500;
    }
    .card-footer { margin-top: auto; }

    .btn-add-inv {
      width: 100%; padding: .45rem .5rem;
      background: #2563eb; color: white; border: none; border-radius: 8px;
      font-size: .8rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-add-inv:hover { background: #1d4ed8; }
    .btn-add-inv:disabled { opacity: .6; cursor: default; }

    .badge-in-inventory {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .35rem .6rem;
      background: #dcfce7; color: #15803d;
      border-radius: 8px; font-size: .78rem; font-weight: 700;
      width: 100%; justify-content: center;
    }

    /* ── Empty state ── */
    .empty-state {
      max-width: 960px; margin: 0 auto;
      text-align: center; padding: 4rem 2rem; color: #64748b;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-title { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: .5rem; }
    .empty-sub { font-size: .875rem; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5); backdrop-filter: blur(3px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fade-in .15s ease;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: 1rem; } }
    @keyframes fade-in { from { opacity:0; } to { opacity:1; } }

    .modal {
      background: white; border-radius: 18px 18px 0 0;
      width: 100%; max-width: 420px;
      padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: slide-up .22s cubic-bezier(.34,1.56,.64,1);
    }
    @media (min-width: 640px) { .modal { border-radius: 18px; animation: scale-in .18s ease; } }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes scale-in { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }

    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: .75rem; margin-bottom: 1.25rem;
    }
    .modal-header-info { flex: 1; }
    .modal-title { font-size: 1.05rem; font-weight: 800; }
    .modal-subtitle { font-size: .875rem; color: #64748b; margin-top: .3rem; font-weight: 600; }
    .modal-close {
      width: 32px; height: 32px; flex-shrink: 0;
      border: none; border-radius: 50%;
      background: #f1f5f9; color: #64748b;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: #e2e8f0; }

    .form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .form-label { font-size: .85rem; font-weight: 600; }
    .form-input, .form-select {
      padding: .55rem .8rem;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .9375rem; color: #1e293b;
      transition: border-color .15s, box-shadow .15s;
      background: white;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-input::placeholder { color: #94a3b8; }
    .form-hint { font-size: .78rem; color: #64748b; margin-top: .25rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    .modal-footer { display: flex; gap: .625rem; }
    .btn-cancel {
      flex: 1; padding: .6rem;
      background: #f1f5f9; color: #475569;
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-save {
      flex: 2; padding: .6rem;
      background: #2563eb; color: white;
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-save:hover { background: #1d4ed8; }
    .btn-save:disabled { opacity: .6; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 300;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show   { opacity: 1; transform: translateY(0); }
    .toast-success { background: #16a34a; }
    .toast-error   { background: #dc2626; }
    .toast-info    { background: #2563eb; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventory" class="btn-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="catalog.back">Inventario</span>
      </a>
      <h1 class="header-title" data-i18n="catalog.title">Catálogo de productos</h1>
      <button class="btn-add-catalog" id="btn-add-catalog">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="catalog.add">+ Agregar al catálogo</span>
      </button>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" class="search-input"
             data-i18n-ph="catalog.search"
             placeholder="Buscar en el catálogo..." autocomplete="off">
    </div>
    <div class="tabs-scroll">
      <div class="tabs-wrap" id="category-tabs">
        <button class="tab-btn active" data-category="all" data-i18n="catalog.tabs.all">Todos</button>
        <button class="tab-btn" data-category="Alimentos"     data-i18n="catalog.tabs.Alimentos">🍎 Alimentos</button>
        <button class="tab-btn" data-category="Bebidas"       data-i18n="catalog.tabs.Bebidas">🥤 Bebidas</button>
        <button class="tab-btn" data-category="Aseo Personal" data-i18n="catalog.tabs.Aseo Personal">🧴 Aseo Personal</button>
        <button class="tab-btn" data-category="Aseo del Hogar" data-i18n="catalog.tabs.Aseo del Hogar">🧹 Aseo del Hogar</button>
        <button class="tab-btn" data-category="Alacena"       data-i18n="catalog.tabs.Alacena">🏺 Alacena</button>
      </div>
    </div>
  </div>

  <p class="catalog-count" id="catalog-count"></p>

  <div class="catalog-grid" id="catalog-grid"></div>

  <div class="empty-state" id="empty-state" hidden>
    <div class="empty-icon">🔍</div>
    <h3 class="empty-title" data-i18n="catalog.empty.title">Sin resultados</h3>
    <p class="empty-sub" data-i18n="catalog.empty.sub">No se encontraron productos con ese criterio.</p>
  </div>

  <!-- Modal: Agregar al inventario -->
  <div class="modal-overlay" id="add-inv-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <div class="modal-header-info">
          <h2 class="modal-title" data-i18n="catalog.modalAdd.title">Agregar al inventario</h2>
          <p class="modal-subtitle" id="add-inv-product-name"></p>
        </div>
        <button class="modal-close" id="add-inv-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="add-inv-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="add-inv-current" data-i18n="catalog.modalAdd.currentQty">Cantidad actual</label>
            <input class="form-input" type="number" id="add-inv-current"
                   min="0" step="0.01" placeholder="0" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="add-inv-min" data-i18n="catalog.modalAdd.minQty">Cantidad mínima</label>
            <input class="form-input" type="number" id="add-inv-min"
                   min="0" step="0.01" placeholder="0" autocomplete="off">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
          <label class="form-label" for="add-inv-unit" data-i18n="catalog.modalAdd.unit">Unidad de medida</label>
          <select class="form-select" id="add-inv-unit">
            <!-- populated dynamically -->
          </select>
        </div>
        <div class="modal-footer" style="margin-top:.5rem">
          <button type="button" class="btn-cancel" id="add-inv-cancel" data-i18n="catalog.modalAdd.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="add-inv-save"   data-i18n="catalog.modalAdd.save">Agregar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Agregar al catálogo -->
  <div class="modal-overlay" id="add-cat-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <div class="modal-header-info">
          <h2 class="modal-title" data-i18n="catalog.modalNew.title">Agregar al catálogo</h2>
        </div>
        <button class="modal-close" id="add-cat-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="add-cat-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="cat-name" data-i18n="catalog.modalNew.name">Nombre del producto</label>
          <input class="form-input" type="text" id="cat-name"
                 data-i18n-ph="catalog.modalNew.namePlaceholder"
                 placeholder="Ej: Lentejas rojas" maxlength="100" required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="cat-category" data-i18n="catalog.modalNew.category">Categoría</label>
          <select class="form-select" id="cat-category" required>
            <option value="Alimentos"     data-i18n="catalog.tabs.Alimentos">🍎 Alimentos</option>
            <option value="Bebidas"       data-i18n="catalog.tabs.Bebidas">🥤 Bebidas</option>
            <option value="Aseo Personal" data-i18n="catalog.tabs.Aseo Personal">🧴 Aseo Personal</option>
            <option value="Aseo del Hogar" data-i18n="catalog.tabs.Aseo del Hogar">🧹 Aseo del Hogar</option>
            <option value="Alacena"       data-i18n="catalog.tabs.Alacena">🏺 Alacena</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="add-cat-cancel" data-i18n="catalog.modalNew.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="add-cat-save"   data-i18n="catalog.modalNew.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
