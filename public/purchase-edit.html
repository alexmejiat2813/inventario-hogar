<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar compra — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b;
      min-height: 100vh;
      padding-bottom: 7rem; /* room for sticky bar */
    }
    button, input, select, textarea, a { font: inherit; cursor: pointer; text-decoration: none; }
    img, svg { display: block; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
      height: 68px;
    }
    .header-inner {
      max-width: 860px; margin: 0 auto;
      height: 100%; padding: 0 1.25rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .8rem; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .header-center { flex: 1; min-width: 0; }
    .header-inv-sub { font-size: .7rem; opacity: .75; font-weight: 500; }
    .header-title { font-size: 1rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-header-save {
      padding: .45rem .9rem;
      background: rgba(255,255,255,.2); color: white;
      border: 1px solid rgba(255,255,255,.35); border-radius: 8px;
      font-size: .82rem; font-weight: 700; white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-header-save:hover:not(:disabled) { background: rgba(255,255,255,.32); }
    .btn-header-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Tabs ── */
    .inv-tabs-bar {
      background: white; border-bottom: 1.5px solid #e2e8f0;
      box-shadow: 0 1px 6px rgba(0,0,0,.04);
      position: sticky; top: 68px; z-index: 90;
    }
    .inv-tabs-inner {
      max-width: 860px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .inv-tabs-inner::-webkit-scrollbar { display: none; }
    .inv-tab {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .65rem 1rem; font-size: .875rem; font-weight: 600;
      color: #64748b; border-bottom: 2px solid transparent;
      white-space: nowrap; flex-shrink: 0; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .inv-tab:hover  { color: #1e293b; }
    .inv-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    @media (max-width: 480px) {
      .inv-tab { padding: .6rem .8rem; }
      .tab-label { display: none; }
    }

    /* ── Main layout ── */
    .main { max-width: 860px; margin: 0 auto; padding: 1.25rem 1rem; }

    /* ── Page section ── */
    .page-section {
      background: white; border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      padding: 1.375rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .section-title {
      font-size: .75rem; font-weight: 800; color: #475569;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 1.125rem;
    }

    /* ── General section ── */
    .field-label {
      font-size: .82rem; font-weight: 700; color: #475569;
      display: block; margin-bottom: .375rem;
    }
    .date-input {
      padding: .55rem .75rem;
      border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: .925rem; font-weight: 600; outline: none;
      transition: border-color .12s; background: white;
    }
    .date-input:focus { border-color: #2563eb; }
    .info-cards {
      display: flex; gap: .875rem; flex-wrap: wrap; margin-top: 1rem;
    }
    .info-card {
      flex: 1; min-width: 120px;
      background: #f8fafc; border-radius: 10px; border: 1.5px solid #e2e8f0;
      padding: .75rem 1rem;
    }
    .info-card--total { border-color: #bfdbfe; background: #eff6ff; }
    .info-card-label { font-size: .72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
    .info-card-value { font-size: 1.2rem; font-weight: 800; color: #1e293b; }
    .info-card-value--total { color: #2563eb; }

    /* ── Items grid (desktop) ── */
    .items-header, .item-row {
      display: grid;
      grid-template-columns: minmax(130px,2.5fr) 72px 96px 96px minmax(110px,1.5fr) 88px 38px;
      align-items: center;
      gap: .5rem;
    }
    .items-header {
      padding: .4rem .5rem;
      margin-bottom: .25rem;
    }
    .items-header .item-cell {
      font-size: .7rem; font-weight: 800; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .item-row {
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: .5rem .625rem; margin-bottom: .5rem;
      transition: border-color .12s;
    }
    .item-row:hover { border-color: #bfdbfe; }
    .item-cell { min-width: 0; }
    .item-cell.cell-subtotal { text-align: right; font-weight: 700; font-size: .875rem; color: #1e293b; white-space: nowrap; }
    .item-cell.cell-del { display: flex; justify-content: center; }

    /* Inputs inside rows */
    .item-input {
      width: 100%; padding: .4rem .5rem;
      border: 1.5px solid #e2e8f0; border-radius: 7px;
      font-size: .855rem; font-weight: 600; outline: none;
      background: white; transition: border-color .12s;
    }
    .item-input:focus { border-color: #2563eb; background: #f0f9ff; }
    select.item-input { padding-right: .3rem; }

    /* Delete row button */
    .btn-del-item {
      width: 30px; height: 30px; padding: 0;
      border: 1.5px solid #fca5a5; border-radius: 7px;
      background: white; color: #dc2626; font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
      flex-shrink: 0;
    }
    .btn-del-item:hover { background: #fef2f2; border-color: #f87171; }

    /* Add item button */
    .btn-add-item {
      margin-top: .75rem;
      padding: .6rem 1rem; border-radius: 9px;
      border: 1.5px dashed #cbd5e1; background: white;
      color: #2563eb; font-size: .875rem; font-weight: 700;
      transition: background .12s, border-color .12s;
      width: 100%;
    }
    .btn-add-item:hover { background: #f0f9ff; border-color: #93c5fd; }

    /* ── Mobile: cards instead of table rows ── */
    @media (max-width: 639px) {
      .items-header { display: none; }
      .item-row {
        display: block;
        padding: .875rem;
      }
      .item-cell { margin-bottom: .5rem; }
      .item-cell::before {
        content: attr(data-label);
        display: block;
        font-size: .68rem; font-weight: 800; color: #94a3b8;
        text-transform: uppercase; letter-spacing: .04em;
        margin-bottom: .2rem;
      }
      .item-cell.cell-del { margin-bottom: 0; margin-top: .375rem; }
      .item-cell.cell-del::before { display: none; }
      .item-cell.cell-del .btn-del-item { width: 100%; height: 34px; font-size: .8rem; gap: .35rem; }
      .item-cell.cell-del .btn-del-item::after { content: attr(data-label); font-size: .8rem; font-weight: 700; }
      .item-cell.cell-subtotal { text-align: left; }

      /* 2-column grid for numeric fields on mobile */
      .item-mobile-row { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    }

    /* ── Taxes section ── */
    .tax-row {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 10px;
      margin-bottom: .5rem; cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .tax-row:hover { background: #f8fafc; }
    .tax-row:has(input:checked) { border-color: #93c5fd; background: #f0f9ff; }
    .tax-row input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: #2563eb; }
    .tax-row-info { flex: 1; }
    .tax-row-name { font-size: .9rem; font-weight: 700; color: #1e293b; }
    .tax-row-rate { font-size: .78rem; color: #64748b; margin-left: .375rem; }
    .tax-amount { font-size: .88rem; font-weight: 700; color: #2563eb; white-space: nowrap; }
    .no-taxes-msg { font-size: .875rem; color: #94a3b8; padding: .5rem 0; }

    /* ── Receipt section ── */
    .receipt-preview { display: flex; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
    .receipt-img {
      width: 120px; height: 90px; object-fit: cover;
      border-radius: 10px; border: 1.5px solid #e2e8f0;
      cursor: pointer; flex-shrink: 0;
      transition: opacity .12s;
    }
    .receipt-img:hover { opacity: .85; }
    .receipt-actions { display: flex; flex-wrap: wrap; gap: .5rem; align-items: flex-start; padding-top: .125rem; }
    .btn-receipt {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .5rem .875rem; border-radius: 9px;
      border: 1.5px solid #e2e8f0; background: white;
      font-size: .84rem; font-weight: 600; color: #475569;
      transition: background .12s; cursor: pointer;
    }
    .btn-receipt:hover { background: #f8fafc; }
    .btn-receipt--danger { border-color: #fca5a5; color: #dc2626; }
    .btn-receipt--danger:hover { background: #fef2f2; }
    .btn-receipt--add { border-style: dashed; color: #2563eb; border-color: #93c5fd; }
    .btn-receipt--add:hover { background: #f0f9ff; }
    .receipt-removed-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; color: #94a3b8; font-size: .875rem; }
    .receipt-new-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .receipt-new-name { font-size: .875rem; font-weight: 600; color: #475569; }

    /* ── Sticky summary bar ── */
    .summary-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: white; border-top: 1.5px solid #e2e8f0;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
      padding: .75rem 1rem;
    }
    .summary-bar-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .bar-totals {
      display: flex; gap: 1.25rem; flex: 1; flex-wrap: wrap; min-width: 0;
    }
    .bar-total-item { display: flex; flex-direction: column; }
    .bar-label { font-size: .68rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
    .bar-amount { font-size: .975rem; font-weight: 800; color: #1e293b; }
    .bar-total-item--total .bar-amount { color: #2563eb; font-size: 1.1rem; }
    .bar-actions { display: flex; gap: .625rem; flex-shrink: 0; }
    .btn-cancel {
      padding: .6rem 1rem; border-radius: 9px;
      border: 1.5px solid #e2e8f0; background: white;
      font-size: .875rem; font-weight: 600; color: #475569;
      transition: background .12s;
    }
    .btn-cancel:hover { background: #f1f5f9; }
    .btn-save {
      padding: .6rem 1.25rem; border-radius: 9px;
      border: none; background: #2563eb; color: white;
      font-size: .875rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-save:hover:not(:disabled) { background: #1d4ed8; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    @media (max-width: 500px) {
      .summary-bar-inner { gap: .625rem; }
      .bar-totals { gap: .875rem; }
      .bar-amount { font-size: .875rem; }
      .bar-total-item--total .bar-amount { font-size: 1rem; }
    }

    /* ── Lightbox ── */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; animation: lb-fade .15s ease;
    }
    @keyframes lb-fade { from { opacity:0; } to { opacity:1; } }
    .lightbox-img { max-width: 100%; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .lightbox-close {
      position: fixed; top: 1rem; right: 1rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.15); color: white; border: none;
      font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 5rem; right: 1rem; left: 1rem; z-index: 400;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 320px; pointer-events: auto;
    }
    .toast--show  { opacity: 1; transform: translateY(0); }
    .toast-error  { background: #dc2626; }
    .toast-success { background: #16a34a; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <button class="btn-back" id="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="purchaseEdit.back">Historial</span>
      </button>
      <div class="header-center">
        <div class="header-inv-sub" id="inv-name"></div>
        <div class="header-title" id="page-title">✏️ <span data-i18n="purchaseEdit.title">Editar compra</span></div>
      </div>
      <button class="btn-header-save" id="btn-header-save" data-i18n="purchaseEdit.saveBtn">Guardar cambios</button>
    </div>
  </header>

  <nav class="inv-tabs-bar">
    <div class="inv-tabs-inner">
      <a href="/inventory" class="inv-tab">
        <span>📊</span><span class="tab-label" data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a href="/inventory?tab=stock" class="inv-tab">
        <span>📦</span><span class="tab-label" data-i18n="invTabs.stock">Stock</span>
      </a>
      <a href="/shopping-list" class="inv-tab">
        <span>🛒</span><span class="tab-label" data-i18n="invTabs.shopping">Compras</span>
      </a>
      <a href="/history" class="inv-tab active">
        <span>📋</span><span class="tab-label" data-i18n="invTabs.history">Historial</span>
      </a>
    </div>
  </nav>

  <main class="main">

    <!-- Section 1: General info -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.general">Información general</h2>
      <label class="field-label" data-i18n="purchaseEdit.date" for="edit-date">Fecha de compra</label>
      <input type="date" class="date-input" id="edit-date">
      <div class="info-cards">
        <div class="info-card">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.subtotal">Subtotal</div>
          <div class="info-card-value" id="card-subtotal">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.taxes">Impuestos</div>
          <div class="info-card-value" id="card-taxes">—</div>
        </div>
        <div class="info-card info-card--total">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.total">Total</div>
          <div class="info-card-value info-card-value--total" id="card-total">—</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Products -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.products">Productos</h2>
      <div id="items-wrap"></div>
      <button class="btn-add-item" id="btn-add-item" data-i18n="purchaseEdit.addProduct">+ Agregar producto</button>
    </section>

    <!-- Section 3: Taxes -->
    <section class="page-section" id="taxes-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.taxes">Impuestos</h2>
      <div id="taxes-wrap"></div>
    </section>

    <!-- Section 4: Receipt -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.receipt">Recibo</h2>
      <div id="receipt-wrap"></div>
    </section>

    <datalist id="products-list"></datalist>
  </main>

  <!-- Sticky bottom bar -->
  <div class="summary-bar">
    <div class="summary-bar-inner">
      <div class="bar-totals">
        <div class="bar-total-item">
          <span class="bar-label" data-i18n="purchaseEdit.bar.subtotal">Subtotal</span>
          <span class="bar-amount" id="bar-subtotal">—</span>
        </div>
        <div class="bar-total-item">
          <span class="bar-label" data-i18n="purchaseEdit.bar.taxes">Imp.</span>
          <span class="bar-amount" id="bar-taxes">—</span>
        </div>
        <div class="bar-total-item bar-total-item--total">
          <span class="bar-label" data-i18n="purchaseEdit.bar.total">Total</span>
          <span class="bar-amount" id="bar-total">—</span>
        </div>
      </div>
      <div class="bar-actions">
        <button class="btn-cancel" id="btn-cancel" data-i18n="purchaseEdit.cancel">Cancelar</button>
        <button class="btn-save" id="btn-save" data-i18n="purchaseEdit.saveBtn">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/purchase-edit.js"></script>
</body>
</html>
