<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar compra — Inventario Hogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
      background: #FBFBFA; color: #111111;
      min-height: 100vh; padding-bottom: 7rem;
    }
    button, input, select, textarea, a { font: inherit; cursor: pointer; text-decoration: none; }
    img, svg { display: block; }

    /* Header */
    .header {
      background: #FFFFFF; border-bottom: 1px solid #EAEAEA;
      position: sticky; top: 0; z-index: 100; height: 56px;
    }
    .header-inner {
      max-width: 1600px; margin: 0 auto;
      height: 100%; padding: 0 1.25rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      color: #787774; font-size: .8rem; font-weight: 500;
      background: none; border: none; padding: 0;
      white-space: nowrap; flex-shrink: 0; transition: color .15s;
    }
    .btn-back:hover { color: #111111; }
    .header-center { flex: 1; min-width: 0; }
    .header-inv-sub { font-size: .68rem; color: #787774; font-weight: 500; }
    .header-title { font-size: .9rem; font-weight: 700; color: #111111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-header-save {
      padding: .4rem .875rem;
      background: #111111; color: white;
      border: none; border-radius: 4px;
      font-size: .78rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
      transition: opacity .15s;
    }
    .btn-header-save:hover:not(:disabled) { opacity: .85; }
    .btn-header-save:disabled { opacity: .35; cursor: not-allowed; }

    /* Tab bar */
    .inv-tabs-bar {
      background: white; border-bottom: 1px solid #EAEAEA;
      position: sticky; top: 56px; z-index: 90;
    }
    .inv-tabs-inner {
      max-width: 1600px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .inv-tabs-inner::-webkit-scrollbar { display: none; }
    .inv-tab {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .65rem 1rem; font-size: .8rem; font-weight: 500;
      color: #787774; border-bottom: 1.5px solid transparent;
      white-space: nowrap; flex-shrink: 0; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .inv-tab:hover { color: #111111; }
    .inv-tab.active { color: #111111; border-bottom-color: #111111; font-weight: 600; }
    .tab-icon-svg { flex-shrink: 0; }
    @media (max-width: 480px) {
      .inv-tab { padding: .6rem .8rem; }
      .tab-label { display: none; }
    }

    /* Main layout */
    .main { max-width: 1600px; margin: 0 auto; padding: 1.25rem 1rem; }

    /* Page section */
    .page-section {
      background: white; border-radius: 8px; border: 1px solid #EAEAEA;
      padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    }
    .section-title {
      font-size: .68rem; font-weight: 700; color: #787774;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem;
    }

    /* General section */
    .field-label {
      font-size: .8rem; font-weight: 600; color: #787774;
      display: block; margin-bottom: .375rem;
    }
    .date-input {
      padding: .5rem .75rem;
      border: 1px solid #EAEAEA; border-radius: 4px;
      font-size: .9rem; font-weight: 600; outline: none;
      transition: border-color .12s; background: white; color: #111111;
    }
    .date-input:focus { border-color: #111111; }
    .info-cards { display: flex; gap: .875rem; flex-wrap: wrap; margin-top: 1rem; }
    .info-card {
      flex: 1; min-width: 120px;
      background: #F8F8F7; border-radius: 6px; border: 1px solid #EAEAEA;
      padding: .75rem 1rem;
    }
    .info-card--total { border-color: #EAEAEA; background: #F8F8F7; }
    .info-card-label { font-size: .68rem; font-weight: 700; color: #787774; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
    .info-card-value { font-size: 1.1rem; font-weight: 700; color: #111111; }
    .info-card-value--total { color: #111111; }

    /* Items grid (desktop) */
    .items-header, .item-row {
      display: grid;
      grid-template-columns: minmax(130px,2.5fr) 72px 96px 96px minmax(110px,1.5fr) 88px 38px;
      align-items: center; gap: .5rem;
    }
    .items-header { padding: .4rem .5rem; margin-bottom: .25rem; }
    .items-header .item-cell {
      font-size: .68rem; font-weight: 700; color: #B2B0AD;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .item-row {
      border: 1px solid #EAEAEA; border-radius: 6px;
      padding: .5rem .625rem; margin-bottom: .5rem;
      transition: border-color .12s;
    }
    .item-row:hover { border-color: #111111; }
    .item-cell { min-width: 0; }
    .item-cell.cell-subtotal { text-align: right; font-weight: 600; font-size: .875rem; color: #111111; white-space: nowrap; }
    .item-cell.cell-del { display: flex; justify-content: center; }

    /* Inputs inside rows */
    .item-input {
      width: 100%; padding: .4rem .5rem;
      border: 1px solid #EAEAEA; border-radius: 4px;
      font-size: .855rem; font-weight: 500; outline: none;
      background: white; color: #111111; transition: border-color .12s;
    }
    .item-input:focus { border-color: #111111; background: #FBFBFA; }
    select.item-input { padding-right: .3rem; }

    /* Delete row button */
    .btn-del-item {
      width: 28px; height: 28px; padding: 0;
      border: 1px solid #F5C0C0; border-radius: 4px;
      background: white; color: #9F2F2D;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s; flex-shrink: 0;
    }
    .btn-del-item:hover { background: #FDEBEC; }

    /* Add item button */
    .btn-add-item {
      margin-top: .75rem; padding: .6rem 1rem; border-radius: 4px;
      border: 1px dashed #EAEAEA; background: white;
      color: #787774; font-size: .875rem; font-weight: 500;
      transition: border-color .12s, color .12s; width: 100%;
    }
    .btn-add-item:hover { border-color: #111111; color: #111111; }

    /* Mobile: cards */
    @media (max-width: 639px) {
      .items-header { display: none; }
      .item-row { display: block; padding: .875rem; }
      .item-cell { margin-bottom: .5rem; }
      .item-cell::before {
        content: attr(data-label);
        display: block;
        font-size: .68rem; font-weight: 700; color: #B2B0AD;
        text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem;
      }
      .item-cell.cell-del { margin-bottom: 0; margin-top: .375rem; }
      .item-cell.cell-del::before { display: none; }
      .item-cell.cell-del .btn-del-item { width: 100%; height: 34px; font-size: .8rem; gap: .35rem; }
      .item-cell.cell-del .btn-del-item::after { content: attr(data-label); font-size: .8rem; font-weight: 600; }
      .item-cell.cell-subtotal { text-align: left; }
      .item-mobile-row { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    }

    /* Taxes section */
    .tax-row {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 1rem; border: 1px solid #EAEAEA; border-radius: 6px;
      margin-bottom: .5rem; cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .tax-row:hover { background: #FBFBFA; }
    .tax-row:has(input:checked) { border-color: #111111; background: #F8F8F7; }
    .tax-row input[type=checkbox] { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: #111111; }
    .tax-row-info { flex: 1; }
    .tax-row-name { font-size: .875rem; font-weight: 600; color: #111111; }
    .tax-row-rate { font-size: .78rem; color: #787774; margin-left: .375rem; }
    .tax-amount { font-size: .875rem; font-weight: 600; color: #111111; white-space: nowrap; }
    .no-taxes-msg { font-size: .875rem; color: #B2B0AD; padding: .5rem 0; }

    /* Receipt section */
    .receipt-preview { display: flex; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
    .receipt-img {
      width: 120px; height: 90px; object-fit: cover;
      border-radius: 6px; border: 1px solid #EAEAEA;
      cursor: pointer; flex-shrink: 0; transition: opacity .12s;
    }
    .receipt-img:hover { opacity: .85; }
    .receipt-actions { display: flex; flex-wrap: wrap; gap: .5rem; align-items: flex-start; padding-top: .125rem; }
    .btn-receipt {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .45rem .875rem; border-radius: 4px;
      border: 1px solid #EAEAEA; background: white;
      font-size: .8rem; font-weight: 500; color: #787774;
      transition: border-color .12s, color .12s; cursor: pointer;
    }
    .btn-receipt:hover { border-color: #111111; color: #111111; }
    .btn-receipt--danger { border-color: #F5C0C0; color: #9F2F2D; }
    .btn-receipt--danger:hover { background: #FDEBEC; border-color: #F5C0C0; }
    .btn-receipt--add { border-style: dashed; }
    .receipt-removed-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; color: #B2B0AD; font-size: .875rem; }
    .receipt-new-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .receipt-new-name { font-size: .875rem; font-weight: 500; color: #787774; }

    /* Sticky summary bar */
    .summary-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: white; border-top: 1px solid #EAEAEA;
      padding: .75rem 1rem;
    }
    .summary-bar-inner {
      max-width: 1600px; margin: 0 auto;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .bar-totals { display: flex; gap: 1.25rem; flex: 1; flex-wrap: wrap; min-width: 0; }
    .bar-total-item { display: flex; flex-direction: column; }
    .bar-label { font-size: .68rem; font-weight: 700; color: #B2B0AD; text-transform: uppercase; letter-spacing: .04em; }
    .bar-amount { font-size: .95rem; font-weight: 700; color: #111111; }
    .bar-total-item--total .bar-amount { font-size: 1.05rem; }
    .bar-actions { display: flex; gap: .5rem; flex-shrink: 0; }
    .btn-cancel {
      padding: .6rem 1rem; border-radius: 4px;
      border: 1px solid #EAEAEA; background: white;
      font-size: .875rem; font-weight: 500; color: #787774;
      transition: border-color .12s, color .12s;
    }
    .btn-cancel:hover { border-color: #111111; color: #111111; }
    .btn-save {
      padding: .6rem 1.25rem; border-radius: 4px;
      border: none; background: #111111; color: white;
      font-size: .875rem; font-weight: 600; transition: opacity .15s;
    }
    .btn-save:hover:not(:disabled) { opacity: .85; }
    .btn-save:disabled { opacity: .35; cursor: not-allowed; }

    @media (max-width: 500px) {
      .summary-bar-inner { gap: .625rem; }
      .bar-totals { gap: .875rem; }
      .bar-amount { font-size: .875rem; }
      .bar-total-item--total .bar-amount { font-size: .95rem; }
    }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; animation: lb-fade .15s ease;
    }
    @keyframes lb-fade { from { opacity:0; } to { opacity:1; } }
    .lightbox-img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
    .lightbox-close {
      position: fixed; top: 1rem; right: 1rem;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 5rem; right: 1rem; left: 1rem; z-index: 400;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 6px;
      font-size: .8rem; font-weight: 500; color: white;
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 320px; pointer-events: auto;
    }
    .toast--show  { opacity: 1; transform: translateY(0); }
    .toast-error  { background: #5C1A19; }
    .toast-success { background: #1C3E1F; }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IH">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <button class="btn-back" id="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="purchaseEdit.back">Historial</span>
      </button>
      <div class="header-center">
        <div class="header-inv-sub" id="inv-name"></div>
        <div class="header-title" id="page-title"><span data-i18n="purchaseEdit.title">Editar compra</span></div>
      </div>
      <button class="btn-header-save" id="btn-header-save" data-i18n="purchaseEdit.saveBtn">Guardar cambios</button>
    </div>
  </header>

  <nav class="inv-tabs-bar">
    <div class="inv-tabs-inner">
      <a href="/inventory" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9"/><rect x="10" y="7" width="5" height="14"/><rect x="17" y="3" width="5" height="18"/></svg>
        <span class="tab-label" data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a href="/inventory?tab=stock" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span class="tab-label" data-i18n="invTabs.stock">Stock</span>
      </a>
      <a href="/shopping-list" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="tab-label" data-i18n="invTabs.shopping">Compras</span>
      </a>
      <a href="/history" class="inv-tab active">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="tab-label" data-i18n="invTabs.history">Historial</span>
      </a>
    </div>
  </nav>

  <main class="main">

    <!-- Section 1: General info -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.general">Información general</h2>
      <label class="field-label" data-i18n="purchaseEdit.date" for="edit-date">Fecha de compra</label>
      <input type="date" class="date-input" id="edit-date">
      <div class="info-cards">
        <div class="info-card">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.subtotal">Subtotal</div>
          <div class="info-card-value" id="card-subtotal">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.taxes">Impuestos</div>
          <div class="info-card-value" id="card-taxes">—</div>
        </div>
        <div class="info-card info-card--total">
          <div class="info-card-label" data-i18n="purchaseEdit.bar.total">Total</div>
          <div class="info-card-value info-card-value--total" id="card-total">—</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Products -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.products">Productos</h2>
      <div id="items-wrap"></div>
      <button class="btn-add-item" id="btn-add-item" data-i18n="purchaseEdit.addProduct">+ Agregar producto</button>
    </section>

    <!-- Section 3: Taxes -->
    <section class="page-section" id="taxes-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.taxes">Impuestos</h2>
      <div id="taxes-wrap"></div>
    </section>

    <!-- Section 4: Receipt -->
    <section class="page-section">
      <h2 class="section-title" data-i18n="purchaseEdit.section.receipt">Recibo</h2>
      <div id="receipt-wrap"></div>
    </section>

    <datalist id="products-list"></datalist>
  </main>

  <!-- Sticky bottom bar -->
  <div class="summary-bar">
    <div class="summary-bar-inner">
      <div class="bar-totals">
        <div class="bar-total-item">
          <span class="bar-label" data-i18n="purchaseEdit.bar.subtotal">Subtotal</span>
          <span class="bar-amount" id="bar-subtotal">—</span>
        </div>
        <div class="bar-total-item">
          <span class="bar-label" data-i18n="purchaseEdit.bar.taxes">Imp.</span>
          <span class="bar-amount" id="bar-taxes">—</span>
        </div>
        <div class="bar-total-item bar-total-item--total">
          <span class="bar-label" data-i18n="purchaseEdit.bar.total">Total</span>
          <span class="bar-amount" id="bar-total">—</span>
        </div>
      </div>
      <div class="bar-actions">
        <button class="btn-cancel" id="btn-cancel" data-i18n="purchaseEdit.cancel">Cancelar</button>
        <button class="btn-save" id="btn-save" data-i18n="purchaseEdit.saveBtn">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/purchase-edit.js"></script>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
