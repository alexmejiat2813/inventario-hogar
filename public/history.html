<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Compras — Inventario Hogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
      background: #F1F5F9; color: #082F49;
      min-height: 100vh; padding-bottom: 4rem;
    }
    button, input, select, a { font: inherit; cursor: pointer; text-decoration: none; }
    img, svg { display: block; }

    /* Header */
    .header {
      background: #FFFFFF; border-bottom: 1px solid #E2E8F0;
      position: sticky; top: 0; z-index: 100; height: 56px;
    }
    .header-inner {
      max-width: 1600px; margin: 0 auto;
      height: 100%; padding: 0 1.25rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      color: #787774; font-size: .8rem; font-weight: 500;
      background: none; border: none; padding: 0;
      white-space: nowrap; flex-shrink: 0; transition: color .15s;
    }
    .btn-back:hover { color: #082F49; }
    .header-brand { display: flex; align-items: center; gap: .625rem; flex: 1; min-width: 0; }
    .header-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; background: #082F49; color: white;
      border-radius: 5px; font-size: .65rem; font-weight: 800;
      letter-spacing: .04em; flex-shrink: 0;
    }
    .header-title-row { display: flex; align-items: center; gap: .5rem; min-width: 0; flex-wrap: wrap; }
    .header-title { font-size: .9375rem; font-weight: 700; color: #082F49; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .role-badge-header {
      display: inline-flex; align-items: center; padding: .15rem .55rem;
      border-radius: 999px; font-size: .6rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase; flex-shrink: 0;
      background: #E0F2FE; color: #0EA5E9;
    }

    /* Tab bar */
    .inv-tabs-bar {
      background: white; border-bottom: 1px solid #E2E8F0;
      position: sticky; top: 56px; z-index: 90;
    }
    .inv-tabs-inner {
      max-width: 1600px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .inv-tabs-inner::-webkit-scrollbar { display: none; }
    .inv-tab {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .65rem 1rem; font-size: .8rem; font-weight: 500;
      color: #787774; border-bottom: 1.5px solid transparent;
      white-space: nowrap; flex-shrink: 0; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .inv-tab:hover { color: #082F49; }
    .inv-tab.active { color: #0EA5E9; border-bottom-color: #0EA5E9; font-weight: 600; }
    .tab-icon-svg { flex-shrink: 0; }
    @media (max-width: 480px) {
      .inv-tab { padding: .6rem .8rem; }
      .tab-label { display: none; }
    }

    /* Main */
    .main { max-width: 1600px; margin: 0 auto; padding: 1rem; }

    /* Summary card */
    .summary-card {
      background: white; border-radius: 8px; border: 1px solid #E2E8F0;
      padding: 1rem 1.25rem; margin-bottom: 1rem;
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .summary-col { flex: 1; min-width: 120px; }
    .summary-label {
      font-size: .72rem; font-weight: 700; color: #787774;
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: .25rem;
    }
    .summary-amount { font-size: 1.25rem; font-weight: 700; color: #082F49; }
    .summary-sub { font-size: .75rem; color: #B2B0AD; margin-top: .15rem; }
    .summary-diff { font-size: .78rem; font-weight: 600; }
    .summary-diff--up   { color: #DC2626; }
    .summary-diff--down { color: #0F766E; }

    /* Filters */
    .filters-row { display: flex; gap: .625rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-select {
      flex: 1; min-width: 160px;
      padding: .45rem .75rem;
      background: white; border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: .8rem; font-weight: 500; color: #082F49;
      outline: none; transition: border-color .12s;
    }
    .filter-select:focus { border-color: #082F49; }

    /* Export button */
    .export-wrap { position: relative; flex-shrink: 0; }
    .btn-export {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .4rem .65rem; background: white; color: #787774;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: .78rem; font-weight: 500;
      transition: border-color .15s, color .15s; cursor: pointer;
    }
    .btn-export:hover { border-color: #082F49; color: #082F49; }
    .export-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: white; border: 1px solid #E2E8F0; border-radius: 6px;
      min-width: 180px; z-index: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.08); overflow: hidden;
    }
    .export-menu-item {
      display: flex; align-items: center; gap: .625rem;
      width: 100%; padding: .65rem 1rem;
      background: none; border: none; text-align: left;
      font-size: .8rem; font-weight: 500; color: #082F49;
      transition: background .12s; cursor: pointer;
    }
    .export-menu-item:hover { background: #F8F8F7; }
    .export-menu-item + .export-menu-item { border-top: 1px solid #F8F8F7; }
    .export-menu-item svg { flex-shrink: 0; color: #787774; }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; color: #787774; }
    .empty-icon  { margin: 0 auto 1rem; color: #B2B0AD; }
    .empty-title { font-size: 1.1rem; font-weight: 700; color: #082F49; margin-bottom: .5rem; }
    .empty-sub   { font-size: .875rem; line-height: 1.6; }

    /* Month heading */
    .month-heading {
      display: flex; align-items: center; gap: .75rem;
      margin: 1.25rem 0 .625rem;
    }
    .month-heading-text {
      font-size: .72rem; font-weight: 700; color: #787774;
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap;
    }
    .month-heading-line { flex: 1; height: 1px; background: #E2E8F0; }
    .month-total { font-size: .78rem; font-weight: 600; color: #787774; white-space: nowrap; }

    /* Session card */
    .session-card {
      background: white; border-radius: 8px; border: 1px solid #E2E8F0;
      margin-bottom: .5rem; overflow: hidden;
    }
    .session-header {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1rem; cursor: pointer; transition: background .12s;
    }
    .session-header:hover { background: #F1F5F9; }
    .session-date { font-size: .875rem; font-weight: 600; color: #082F49; }
    .session-meta { font-size: .75rem; color: #787774; margin-top: .1rem; }
    .session-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
    .session-total { font-size: .95rem; font-weight: 700; color: #082F49; }
    .session-total--zero { color: #B2B0AD; font-size: .875rem; }
    .session-receipt-icon {
      color: #787774; cursor: pointer; text-decoration: none;
      transition: color .12s;
    }
    .session-receipt-icon:hover { color: #082F49; }
    .session-chevron { color: #B2B0AD; transition: transform .18s; flex-shrink: 0; }
    .session-chevron--open { transform: rotate(180deg); }

    /* Session detail */
    .session-detail { border-top: 1px solid #E2E8F0; padding: .75rem 1rem 1rem; }
    .detail-store-group { margin-bottom: .875rem; }
    .detail-store-header {
      font-size: .72rem; font-weight: 700; color: #787774;
      padding: .2rem .5rem; background: #F8F8F7; border-radius: 4px;
      margin-bottom: .375rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-store-sub { color: #787774; font-weight: 500; }
    .detail-item {
      display: flex; align-items: baseline;
      gap: .375rem; padding: .25rem .5rem; font-size: .82rem;
    }
    .detail-item-bullet { color: #E2E8F0; font-size: .8rem; flex-shrink: 0; }
    .detail-item-name   { flex: 1; font-weight: 500; color: #082F49; }
    .detail-item-qty    { color: #787774; white-space: nowrap; }
    .detail-item-price  { font-weight: 600; white-space: nowrap; margin-left: auto; }

    /* Financial summary (detail) */
    .fin-summary {
      background: #F8F8F7; border-radius: 6px;
      padding: .625rem .875rem; margin-bottom: .75rem;
      border: 1px solid #E2E8F0;
    }
    .fin-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .82rem; padding: .2rem 0; color: #787774;
    }
    .fin-row--total {
      font-weight: 700; font-size: .9rem; color: #082F49;
      padding-top: .375rem; border-top: 1px solid #E2E8F0; margin-top: .2rem;
    }

    /* Delete modal options */
    .delete-options { display: flex; flex-direction: column; gap: .625rem; margin-bottom: 1rem; }
    .delete-option {
      display: flex; align-items: flex-start; gap: .625rem;
      padding: .75rem; border: 1px solid #E2E8F0; border-radius: 6px;
      cursor: pointer; transition: border-color .12s, background .12s;
    }
    .delete-option:hover { background: #F1F5F9; }
    .delete-option input[type=radio] { margin-top: .2rem; flex-shrink: 0; cursor: pointer; accent-color: #082F49; }
    .delete-option-title { font-size: .875rem; font-weight: 600; color: #082F49; }
    .delete-option-sub   { font-size: .775rem; color: #787774; margin-top: .15rem; }
    .delete-confirm-section { margin-top: .25rem; }
    .delete-confirm-label { font-size: .8rem; font-weight: 600; color: #787774; display: block; margin-bottom: .375rem; }
    .delete-confirm-input {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: .9rem; font-weight: 500; outline: none;
      transition: border-color .15s;
    }
    .delete-confirm-input:focus { border-color: #DC2626; }
    .btn-delete-exec {
      flex: 2; padding: .6rem; background: #DC2626; color: white;
      border: none; border-radius: 4px;
      font-size: .875rem; font-weight: 600; transition: opacity .15s;
    }
    .btn-delete-exec:hover:not(:disabled) { opacity: .85; }
    .btn-delete-exec:disabled { opacity: .35; cursor: not-allowed; }

    /* Lightbox */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; animation: lb-fade .15s ease;
    }
    @keyframes lb-fade { from { opacity:0; } to { opacity:1; } }
    .lightbox-img {
      max-width: 100%; max-height: 90vh;
      border-radius: 8px;
    }
    .lightbox-close {
      position: fixed; top: 1rem; right: 1rem;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 400;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 6px;
      font-size: .8rem; font-weight: 500; color: white;
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show  { opacity: 1; transform: translateY(0); }
    .toast-error   { background: #5C1A19; }
    .toast-success { background: #1C3E1F; }

    /* Modal (delete session) */
    .modal-overlay-delete {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.3); backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      animation: lb-fade .15s ease;
    }
    .modal-inner {
      position: relative; background: white; border-radius: 8px; border: 1px solid #E2E8F0;
      width: 90%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; display: flex; flex-direction: column;
      animation: sl-scale .15s ease;
    }
    @keyframes sl-scale { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }
    .modal-inner-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem .875rem; border-bottom: 1px solid #E2E8F0; flex-shrink: 0;
    }
    .modal-inner-title { font-size: 1rem; font-weight: 700; color: #082F49; }
    .modal-inner-close {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      background: #F8F8F7; border: 1px solid #E2E8F0; border-radius: 4px;
      color: #787774; font-size: .9rem;
    }
    .modal-inner-close:hover { border-color: #082F49; color: #082F49; }
    .modal-inner-body { overflow-y: auto; flex: 1; padding: 1rem 1.5rem; }
    .modal-inner-foot {
      display: flex; gap: .5rem; padding: 1rem 1.5rem;
      border-top: 1px solid #E2E8F0; flex-shrink: 0;
    }
    .btn-modal-cancel {
      flex: 1; padding: .6rem; background: white; color: #787774;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: .875rem; font-weight: 500;
    }
    .btn-modal-cancel:hover { border-color: #082F49; color: #082F49; }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#082F49">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IH">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventories" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="inventory.back">Inventarios</span>
      </a>
      <div class="header-brand">
        <div class="header-icon">IH</div>
        <div class="header-title-row">
          <h1 class="header-title" id="inv-name">Inventario</h1>
          <span class="role-badge-header" id="role-badge"></span>
        </div>
      </div>
      <div class="export-wrap" id="export-wrap">
        <button class="btn-export" id="btn-export" aria-haspopup="true" aria-expanded="false">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="history.export.btn">Exportar</span>
        </button>
        <div class="export-menu" id="export-menu" hidden>
          <button class="export-menu-item" id="export-pdf">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span data-i18n="history.export.pdf">Exportar a PDF</span>
          </button>
          <button class="export-menu-item" id="export-csv">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
            <span data-i18n="history.export.csv">Exportar a CSV</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav class="inv-tabs-bar">
    <div class="inv-tabs-inner">
      <a href="/inventory" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9"/><rect x="10" y="7" width="5" height="14"/><rect x="17" y="3" width="5" height="18"/></svg>
        <span class="tab-label" data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a href="/inventory?tab=stock" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span class="tab-label" data-i18n="invTabs.stock">Stock</span>
      </a>
      <a href="/shopping-list" class="inv-tab">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="tab-label" data-i18n="invTabs.shopping">Compras</span>
      </a>
      <span class="inv-tab active">
        <svg class="tab-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="tab-label" data-i18n="invTabs.history">Historial</span>
      </span>
    </div>
  </nav>

  <main class="main">
    <!-- Monthly summary -->
    <div class="summary-card" id="summary-card" hidden>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.thisMonth">Este mes</div>
        <div class="summary-amount" id="summary-this-month">—</div>
        <div class="summary-sub" id="summary-this-count"></div>
      </div>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.lastMonth">Mes anterior</div>
        <div class="summary-amount" id="summary-last-month">—</div>
        <div class="summary-diff" id="summary-diff"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-row" id="filters-row" hidden>
      <select class="filter-select" id="filter-month">
        <option value="" data-i18n="history.filter.allMonths">Todos los meses</option>
      </select>
      <select class="filter-select" id="filter-store">
        <option value="" data-i18n="history.filter.allStores">Todos los establecimientos</option>
      </select>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h2 class="empty-title" data-i18n="history.empty.title">Sin historial</h2>
      <p class="empty-sub" data-i18n="history.empty.sub">Aún no hay compras registradas.</p>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list"></div>
  </main>

  <!-- Delete session modal -->
  <div class="lightbox-overlay modal-overlay-delete" id="delete-session-overlay" hidden>
    <div class="modal-inner">
      <div class="modal-inner-head">
        <h2 class="modal-inner-title" data-i18n="history.deleteSession.title">Eliminar compra</h2>
        <button id="btn-delete-session-close" class="modal-inner-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-inner-body">
        <div class="delete-options">
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="record" checked>
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRecord">Solo eliminar el registro</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRecordSub">Las cantidades en el inventario no se modifican</div>
            </div>
          </label>
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="revert">
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRevert">Eliminar y revertir inventario</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRevertSub">Se descuentan del inventario las cantidades compradas</div>
            </div>
          </label>
        </div>
        <div class="delete-confirm-section">
          <label class="delete-confirm-label" id="delete-confirm-label" data-i18n="history.deleteSession.confirmLabel">Escribí ELIMINAR para confirmar</label>
          <input type="text" id="delete-confirm-input" class="delete-confirm-input"
                 data-i18n-ph="history.deleteSession.confirmPlaceholder"
                 placeholder="ELIMINAR" autocomplete="off">
        </div>
      </div>
      <div class="modal-inner-foot">
        <button id="btn-delete-session-cancel" class="btn-modal-cancel" data-i18n="history.deleteSession.cancel">Cancelar</button>
        <button id="btn-delete-session-confirm" class="btn-delete-exec" disabled data-i18n="history.deleteSession.btn">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="Recibo">
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/history.js"></script>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
