<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Compras — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b;
      min-height: 100vh; padding-bottom: 4rem;
    }
    button, input, select, a { font: inherit; cursor: pointer; text-decoration: none; }
    img, svg { display: block; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
    }
    .header-inner {
      max-width: 720px; margin: 0 auto; padding: .875rem 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .8rem; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .header-title { font-size: 1.05rem; font-weight: 800; flex: 1; }
    .header-inv-sub { font-size: .7rem; opacity: .75; font-weight: 500; }

    /* ── Main ── */
    .main { max-width: 720px; margin: 0 auto; padding: 1rem; }

    /* ── Summary card ── */
    .summary-card {
      background: white; border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.125rem;
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .summary-col { flex: 1; min-width: 120px; }
    .summary-label { font-size: .72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .25rem; }
    .summary-amount { font-size: 1.35rem; font-weight: 800; color: #1e293b; }
    .summary-sub { font-size: .75rem; color: #94a3b8; margin-top: .15rem; }
    .summary-diff { font-size: .78rem; font-weight: 700; }
    .summary-diff--up   { color: #dc2626; }
    .summary-diff--down { color: #16a34a; }

    /* ── Filters ── */
    .filters-row {
      display: flex; gap: .625rem; margin-bottom: 1.125rem; flex-wrap: wrap;
    }
    .filter-select {
      flex: 1; min-width: 160px;
      padding: .5rem .75rem;
      background: white; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .85rem; font-weight: 600; color: #1e293b;
      outline: none; transition: border-color .12s;
    }
    .filter-select:focus { border-color: #2563eb; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 4rem 2rem; color: #64748b;
    }
    .empty-icon  { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-title { font-size: 1.2rem; font-weight: 800; color: #1e293b; margin-bottom: .5rem; }
    .empty-sub   { font-size: .875rem; line-height: 1.6; }

    /* ── Month heading ── */
    .month-heading {
      display: flex; align-items: center; gap: .75rem;
      margin: 1.25rem 0 .625rem;
    }
    .month-heading-text {
      font-size: .8rem; font-weight: 800; color: #475569;
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap;
    }
    .month-heading-line { flex: 1; height: 1px; background: #e2e8f0; }
    .month-total { font-size: .78rem; font-weight: 700; color: #64748b; white-space: nowrap; }

    /* ── Session card ── */
    .session-card {
      background: white; border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      margin-bottom: .625rem;
      overflow: hidden;
    }
    .session-header {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1rem;
      cursor: pointer;
      transition: background .12s;
    }
    .session-header:hover { background: #f8fafc; }
    .session-date { font-size: .875rem; font-weight: 700; color: #1e293b; }
    .session-meta { font-size: .75rem; color: #64748b; margin-top: .1rem; }
    .session-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
    .session-total { font-size: 1rem; font-weight: 800; color: #2563eb; }
    .session-total--zero { color: #94a3b8; font-size: .875rem; }
    .session-receipt-icon {
      font-size: 1.1rem; cursor: pointer;
      text-decoration: none;
      transition: transform .12s;
    }
    .session-receipt-icon:hover { transform: scale(1.2); }
    .session-chevron {
      color: #94a3b8; transition: transform .18s; flex-shrink: 0;
    }
    .session-chevron--open { transform: rotate(180deg); }

    /* Session detail */
    .session-detail {
      border-top: 1px solid #f1f5f9;
      padding: .75rem 1rem 1rem;
    }
    .detail-store-group { margin-bottom: .875rem; }
    .detail-store-header {
      font-size: .78rem; font-weight: 700; color: #475569;
      padding: .25rem .5rem; background: #f8fafc; border-radius: 6px;
      margin-bottom: .375rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-store-sub { color: #64748b; font-weight: 600; }
    .detail-item {
      display: flex; align-items: baseline;
      gap: .375rem; padding: .25rem .5rem;
      font-size: .82rem;
    }
    .detail-item-bullet { color: #cbd5e1; font-size: .8rem; flex-shrink: 0; }
    .detail-item-name   { flex: 1; font-weight: 600; }
    .detail-item-qty    { color: #64748b; white-space: nowrap; }
    .detail-item-price  { font-weight: 700; white-space: nowrap; margin-left: auto; }

    /* ── Receipt modal (lightbox) ── */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      animation: lb-fade .15s ease;
    }
    @keyframes lb-fade { from { opacity:0; } to { opacity:1; } }
    .lightbox-img {
      max-width: 100%; max-height: 90vh;
      border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-close {
      position: fixed; top: 1rem; right: 1rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.15); color: white; border: none;
      font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }

    /* ── Delete session modal ── */
    .delete-modal { max-width: 440px; }
    .delete-options { display: flex; flex-direction: column; gap: .625rem; margin-bottom: 1rem; }
    .delete-option {
      display: flex; align-items: flex-start; gap: .625rem;
      padding: .75rem; border: 1.5px solid #e2e8f0; border-radius: 10px;
      cursor: pointer; transition: border-color .12s, background .12s;
    }
    .delete-option:hover { background: #f8fafc; }
    .delete-option input[type=radio] { margin-top: .2rem; flex-shrink: 0; cursor: pointer; }
    .delete-option-title { font-size: .875rem; font-weight: 700; color: #1e293b; }
    .delete-option-sub   { font-size: .775rem; color: #64748b; margin-top: .15rem; }
    .delete-confirm-section { margin-top: .25rem; }
    .delete-confirm-label { font-size: .8rem; font-weight: 700; color: #64748b; display: block; margin-bottom: .375rem; }
    .delete-confirm-input {
      width: 100%; padding: .55rem .75rem;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .9rem; font-weight: 600; outline: none;
      transition: border-color .15s;
    }
    .delete-confirm-input:focus { border-color: #dc2626; }
    .btn-delete-exec {
      flex: 2; padding: .65rem;
      background: #dc2626; color: white;
      border: none; border-radius: 10px;
      font-size: .9rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-delete-exec:hover:not(:disabled) { background: #b91c1c; }
    .btn-delete-exec:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 400;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show  { opacity: 1; transform: translateY(0); }
    .toast-error  { background: #dc2626; }

    /* ── Inv tabs ── */
    .inv-tabs-bar {
      background: white; border-bottom: 1.5px solid #e2e8f0;
      box-shadow: 0 1px 6px rgba(0,0,0,.04);
    }
    .inv-tabs-inner {
      max-width: 720px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .inv-tabs-inner::-webkit-scrollbar { display: none; }
    .inv-tab {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .65rem 1rem; font-size: .875rem; font-weight: 600;
      color: #64748b; border-bottom: 2px solid transparent;
      white-space: nowrap; flex-shrink: 0; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .inv-tab:hover  { color: #1e293b; }
    .inv-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    @media (max-width: 480px) {
      .inv-tab { padding: .6rem .8rem; }
      .tab-label { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventory" class="btn-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="history.back">Inventario</span>
      </a>
      <div>
        <div class="header-inv-sub" id="inv-name"></div>
        <div class="header-title">
          📋 <span data-i18n="history.title">Historial de compras</span>
        </div>
      </div>
    </div>
  </header>

  <nav class="inv-tabs-bar">
    <div class="inv-tabs-inner">
      <a href="/inventory" class="inv-tab">
        <span>📊</span><span class="tab-label" data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a href="/inventory?tab=stock" class="inv-tab">
        <span>📦</span><span class="tab-label" data-i18n="invTabs.stock">Stock</span>
      </a>
      <a href="/shopping-list" class="inv-tab">
        <span>🛒</span><span class="tab-label" data-i18n="invTabs.shopping">Compras</span>
      </a>
      <span class="inv-tab active">
        <span>📋</span><span class="tab-label" data-i18n="invTabs.history">Historial</span>
      </span>
    </div>
  </nav>

  <main class="main">
    <!-- Monthly summary -->
    <div class="summary-card" id="summary-card" hidden>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.thisMonth">Este mes</div>
        <div class="summary-amount" id="summary-this-month">—</div>
        <div class="summary-sub" id="summary-this-count"></div>
      </div>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.lastMonth">Mes anterior</div>
        <div class="summary-amount" id="summary-last-month">—</div>
        <div class="summary-diff" id="summary-diff"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-row" id="filters-row" hidden>
      <select class="filter-select" id="filter-month">
        <option value="" data-i18n="history.filter.allMonths">Todos los meses</option>
      </select>
      <select class="filter-select" id="filter-store">
        <option value="" data-i18n="history.filter.allStores">Todos los establecimientos</option>
      </select>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">🧾</div>
      <h2 class="empty-title" data-i18n="history.empty.title">Sin historial</h2>
      <p class="empty-sub" data-i18n="history.empty.sub">Aún no hay compras registradas.</p>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list"></div>
  </main>

  <!-- Delete session modal -->
  <div class="lightbox-overlay" id="delete-session-overlay" hidden style="align-items:flex-end;justify-content:center;padding:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);">
    <div style="background:white;border-radius:20px 20px 0 0;width:100%;max-width:440px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:lb-fade .15s ease;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem .875rem;border-bottom:1px solid #f1f5f9;flex-shrink:0;">
        <h2 style="font-size:1.05rem;font-weight:800;" data-i18n="history.deleteSession.title">Eliminar compra</h2>
        <button id="btn-delete-session-close" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;border:none;border-radius:8px;color:#475569;font-size:1rem;">✕</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding:1rem 1.5rem;">
        <div class="delete-options">
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="record" checked>
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRecord">Solo eliminar el registro</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRecordSub">Las cantidades en el inventario no se modifican</div>
            </div>
          </label>
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="revert">
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRevert">Eliminar y revertir inventario</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRevertSub">Se descuentan del inventario las cantidades compradas</div>
            </div>
          </label>
        </div>
        <div class="delete-confirm-section">
          <label class="delete-confirm-label" id="delete-confirm-label" data-i18n="history.deleteSession.confirmLabel">Escribí ELIMINAR para confirmar</label>
          <input type="text" id="delete-confirm-input" class="delete-confirm-input"
                 data-i18n-ph="history.deleteSession.confirmPlaceholder"
                 placeholder="ELIMINAR" autocomplete="off">
        </div>
      </div>
      <div style="display:flex;gap:.625rem;padding:1rem 1.5rem;border-top:1px solid #f1f5f9;flex-shrink:0;">
        <button id="btn-delete-session-cancel" style="flex:1;padding:.65rem;background:#f1f5f9;color:#475569;border:none;border-radius:10px;font-size:.9rem;font-weight:600;" data-i18n="history.deleteSession.cancel">Cancelar</button>
        <button id="btn-delete-session-confirm" class="btn-delete-exec" disabled data-i18n="history.deleteSession.btn">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="Recibo">
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
