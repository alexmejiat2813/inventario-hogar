<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Compras — Inventario Hogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/history.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/shortcuts.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#082F49">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IH">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventories" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="btn-back-label" data-i18n="inventory.back">Inventarios</span>
      </a>
      <div class="header-brand">
        <div class="header-icon">IH</div>
        <h1 class="header-title" id="inv-name">Inventario</h1>
        <span class="header-crumb">/ <span data-i18n="invTabs.history">Historial</span></span>
        <span class="role-badge-header" id="role-badge" hidden></span>
      </div>

      <!-- Tabs principales -->
      <nav class="top-tabs" id="top-tabs">
        <a class="top-tab" href="/inventory">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9"/><rect x="10" y="7" width="5" height="14"/><rect x="17" y="3" width="5" height="18"/></svg>
          <span data-i18n="invTabs.dashboard">Dashboard</span>
        </a>
        <a class="top-tab" href="/products">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
          <span data-i18n="invTabs.products">Productos</span>
        </a>
        <a class="top-tab" href="/inventory?tab=stock">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span data-i18n="invTabs.stock">Stock</span>
        </a>
        <a class="top-tab" href="/shopping-list">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span data-i18n="invTabs.shopping">Compras</span>
        </a>
        <a class="top-tab active" href="/history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span data-i18n="invTabs.history">Historial</span>
        </a>
      </nav>

      <div class="header-right">
        <button class="mob-ham" id="mob-ham" aria-label="Abrir menú">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <button class="profile-btn" id="profile-btn" aria-label="Menú de usuario" aria-expanded="false">
            <img class="user-avatar" id="user-avatar" src="" alt="" hidden>
            <div class="avatar-placeholder" id="avatar-placeholder"></div>
          </button>
          <div class="profile-dropdown" id="profile-dropdown" hidden>
            <div class="dropdown-header">
              <img class="dropdown-avatar" id="dropdown-avatar" src="" alt="" hidden>
              <div class="dropdown-avatar-ph" id="dropdown-avatar-ph"></div>
              <div class="dropdown-user-info">
                <span class="dropdown-name"  id="dropdown-name"></span>
                <span class="dropdown-email" id="dropdown-email"></span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-lang">
              <span class="dropdown-lang-label" data-i18n="profile.language">Idioma</span>
              <div class="lang-btns">
                <button class="lang-btn" data-lang="es">ES <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="en">EN <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="fr">FR <span class="lang-check">✓</span></button>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <a href="/settings" class="dropdown-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span data-i18n="profile.settings">Configuración</span>
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="btn-share">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              <span data-i18n="profile.share">Compartir app</span>
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item dropdown-item-danger" id="btn-logout">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span data-i18n="profile.logout">Cerrar sesión</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== BARRA DE ACCIONES (Historial) ===== -->
  <div class="action-bar" id="action-bar">
    <div class="action-bar-inner">
      <div class="export-wrap" id="export-wrap">
        <button class="btn-export" id="btn-export" aria-haspopup="true" aria-expanded="false">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="history.export.btn">Exportar</span>
        </button>
        <div class="export-menu" id="export-menu" hidden>
          <button class="export-menu-item" id="export-pdf">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span data-i18n="history.export.pdf">Exportar a PDF</span>
          </button>
          <button class="export-menu-item" id="export-csv">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
            <span data-i18n="history.export.csv">Exportar a CSV</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Drawer móvil -->
  <div class="mob-overlay" id="mob-overlay"></div>
  <aside class="mob-drawer" id="mob-drawer" aria-hidden="true" data-mob-acts='{"export-pdf":"export-pdf","export-csv":"export-csv"}'>
    <div class="mob-dhead">
      <span class="mob-dhead-title" data-i18n="history.title">Historial de compras</span>
      <button class="mob-dclose" id="mob-dclose" aria-label="Cerrar menú">✕</button>
    </div>
    <div class="mob-dbody">
      <div class="mob-dlabel" data-i18n="invTabs.section">Navegación</div>
      <a class="mob-ditem" href="/inventory">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="5" height="9"/><rect x="10" y="7" width="5" height="14"/><rect x="17" y="3" width="5" height="18"/></svg>
        <span data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a class="mob-ditem" href="/products">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        <span data-i18n="invTabs.products">Productos</span>
      </a>
      <a class="mob-ditem" href="/inventory?tab=stock">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span data-i18n="invTabs.stock">Stock</span>
      </a>
      <a class="mob-ditem" href="/shopping-list">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span data-i18n="invTabs.shopping">Compras</span>
      </a>
      <span class="mob-ditem mob-active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span data-i18n="invTabs.history">Historial</span>
      </span>
      <div class="mob-ddivider"></div>
      <div class="mob-dlabel" data-i18n="history.export.btn">Exportar</div>
      <button class="mob-ditem" data-mob-act="export-pdf">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span data-i18n="history.export.pdf">Exportar a PDF</span>
      </button>
      <button class="mob-ditem" data-mob-act="export-csv">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
        <span data-i18n="history.export.csv">Exportar a CSV</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <!-- Monthly summary -->
    <div class="summary-card" id="summary-card" hidden>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.thisMonth">Este mes</div>
        <div class="summary-amount" id="summary-this-month">—</div>
        <div class="summary-sub" id="summary-this-count"></div>
      </div>
      <div class="summary-col">
        <div class="summary-label" data-i18n="history.summary.lastMonth">Mes anterior</div>
        <div class="summary-amount" id="summary-last-month">—</div>
        <div class="summary-diff" id="summary-diff"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-row" id="filters-row" hidden>
      <select class="filter-select" id="filter-month">
        <option value="" data-i18n="history.filter.allMonths">Todos los meses</option>
      </select>
      <select class="filter-select" id="filter-store">
        <option value="" data-i18n="history.filter.allStores">Todos los establecimientos</option>
      </select>
      <select class="filter-select" id="filter-budget-category" hidden>
        <option value="" data-i18n="history.filter.allCategories">Todas las categorías</option>
      </select>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h2 class="empty-title" data-i18n="history.empty.title">Sin historial</h2>
      <p class="empty-sub" data-i18n="history.empty.sub">Aún no hay compras registradas.</p>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list"></div>
  </main>

  <!-- Delete session modal -->
  <div class="lightbox-overlay modal-overlay-delete" id="delete-session-overlay" hidden>
    <div class="modal-inner">
      <div class="modal-inner-head">
        <h2 class="modal-inner-title" data-i18n="history.deleteSession.title">Eliminar compra</h2>
        <button id="btn-delete-session-close" class="modal-inner-close" aria-label="Cerrar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-inner-body">
        <div class="delete-options">
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="record" checked>
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRecord">Solo eliminar el registro</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRecordSub">Las cantidades en el inventario no se modifican</div>
            </div>
          </label>
          <label class="delete-option">
            <input type="radio" name="delete-mode" value="revert">
            <div>
              <div class="delete-option-title" data-i18n="history.deleteSession.optionRevert">Eliminar y revertir inventario</div>
              <div class="delete-option-sub" data-i18n="history.deleteSession.optionRevertSub">Se descuentan del inventario las cantidades compradas</div>
            </div>
          </label>
        </div>
        <div class="delete-confirm-section">
          <label class="delete-confirm-label" id="delete-confirm-label" data-i18n="history.deleteSession.confirmLabel">Escribí ELIMINAR para confirmar</label>
          <input type="text" id="delete-confirm-input" class="delete-confirm-input"
                 data-i18n-ph="history.deleteSession.confirmPlaceholder"
                 placeholder="ELIMINAR" autocomplete="off">
        </div>
      </div>
      <div class="modal-inner-foot">
        <button id="btn-delete-session-cancel" class="btn-modal-cancel" data-i18n="history.deleteSession.cancel">Cancelar</button>
        <button id="btn-delete-session-confirm" class="btn-delete-exec" disabled data-i18n="history.deleteSession.btn">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="Recibo">
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/shortcuts.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/mob-drawer.js"></script>
  <script src="/js/header.js"></script>
  <!-- Volver arriba -->
  <button class="back-to-top" id="back-to-top" aria-label="Subir" title="Subir">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script src="/js/back-to-top.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
