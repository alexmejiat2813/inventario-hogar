<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Hogar</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">🏠</span>
        <div>
          <h1 class="header-title">Inventario Hogar</h1>
          <p class="header-subtitle">Gestión de productos del hogar</p>
        </div>
      </div>
      <div class="header-right">
        <button class="btn btn-primary" id="btn-add">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Agregar</span>
        </button>
        <div class="header-user">
          <img class="user-avatar" id="user-avatar" src="" alt="" hidden>
          <span class="user-name" id="user-name"></span>
          <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ===== STATS ===== -->
    <section class="stats-section">
      <div class="stat-card">
        <div class="stat-icon-wrap stat-blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <div class="stat-body">
          <span class="stat-value" id="stat-total">—</span>
          <span class="stat-label">Total productos</span>
        </div>
      </div>

      <div class="stat-card stat-card-danger">
        <div class="stat-icon-wrap stat-red">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="stat-body">
          <span class="stat-value" id="stat-critical">—</span>
          <span class="stat-label">Stock crítico</span>
        </div>
      </div>

      <div class="stat-card stat-categories-card">
        <p class="stat-cats-title">Por categoría</p>
        <div id="stat-categories" class="cat-stats-grid"></div>
      </div>
    </section>

    <!-- ===== FILTROS ===== -->
    <section class="filters-section">
      <div class="tabs-scroll">
        <div class="tabs-wrap" id="category-tabs">
          <button class="tab-btn active" data-category="all">Todos</button>
          <button class="tab-btn" data-category="Alimentos">🍎 Alimentos</button>
          <button class="tab-btn" data-category="Aseo">🧼 Aseo</button>
          <button class="tab-btn" data-category="Alacena">🏺 Alacena</button>
          <button class="tab-btn" data-category="Bebidas">🥤 Bebidas</button>
          <button class="tab-btn" data-category="Otros">📦 Otros</button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" class="search-input" placeholder="Buscar producto..." autocomplete="off">
      </div>
    </section>

    <!-- ===== PRODUCTOS ===== -->
    <section class="products-section">
      <div class="products-grid" id="products-grid"></div>
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-icon">📦</div>
        <h3>Sin productos</h3>
        <p>No hay productos en esta categoría.<br>Agrega uno con el botón de arriba.</p>
      </div>
    </section>

  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Agregar producto</h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form class="modal-form" id="product-form" novalidate>
        <input type="hidden" id="product-id">

        <div class="form-group">
          <label class="form-label" for="f-name">Nombre del producto</label>
          <input class="form-input" type="text" id="f-name" required
                 placeholder="Ej: Aceite de oliva" maxlength="100" autocomplete="off">
        </div>

        <div class="form-group">
          <label class="form-label" for="f-category">Categoría</label>
          <select class="form-select" id="f-category" required>
            <option value="">Seleccionar categoría…</option>
            <option value="Alimentos">🍎 Alimentos</option>
            <option value="Aseo">🧼 Aseo</option>
            <option value="Alacena">🏺 Alacena</option>
            <option value="Bebidas">🥤 Bebidas</option>
            <option value="Otros">📦 Otros</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-current">Cantidad actual</label>
            <input class="form-input" type="number" id="f-current" required
                   min="0" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-min">Cantidad mínima</label>
            <input class="form-input" type="number" id="f-min" required
                   min="0" step="0.01" placeholder="0">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-unit">Unidad de medida</label>
          <select class="form-select" id="f-unit" required>
            <option value="unidades">unidades</option>
            <option value="kg">kg — kilogramos</option>
            <option value="g">g — gramos</option>
            <option value="lt">lt — litros</option>
            <option value="ml">ml — mililitros</option>
            <option value="paquetes">paquetes</option>
            <option value="cajas">cajas</option>
            <option value="bolsas">bolsas</option>
            <option value="latas">latas</option>
            <option value="botellas">botellas</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
