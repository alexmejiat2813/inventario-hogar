<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Hogar</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/inventories" class="btn-back" title="Mis inventarios">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span class="btn-back-label" data-i18n="inventory.back">Inventarios</span>
        </a>
        <div class="header-brand">
          <span class="header-icon">🏠</span>
          <div>
            <h1 class="header-title" id="inventory-name">Inventario</h1>
            <div class="header-meta">
              <span class="role-badge-header" id="role-badge">…</span>
            </div>
          </div>
        </div>
      </div>

      <div class="header-right">
        <a href="/shopping-list" class="btn-cart" id="btn-cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-badge" hidden>0</span>
        </a>
        <!-- Split add-menu -->
        <div class="add-menu-wrap" id="add-menu-wrap">
          <div class="add-menu-btn-group">
            <button class="btn btn-primary add-menu-main" id="btn-add">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span class="btn-add-label" data-i18n="inventory.add">Agregar</span>
            </button>
            <button class="btn btn-primary add-menu-chevron" id="btn-add-chevron" aria-label="Opciones">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
          <div class="add-menu" id="add-menu" hidden>
            <button class="add-menu-item" id="add-from-catalog">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              <span data-i18n="inventory.addMenu.fromCatalog">Del catálogo</span>
            </button>
            <button class="add-menu-item" id="add-custom">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="inventory.addMenu.custom">Producto personalizado</span>
            </button>
          </div>
        </div>

        <!-- Profile button + dropdown -->
        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <button class="profile-btn" id="profile-btn" aria-label="Menú de usuario" aria-expanded="false">
            <img class="user-avatar" id="user-avatar" src="" alt="" hidden>
            <div class="avatar-placeholder" id="avatar-placeholder"></div>
          </button>

          <div class="profile-dropdown" id="profile-dropdown" hidden>
            <!-- User info -->
            <div class="dropdown-header">
              <img class="dropdown-avatar" id="dropdown-avatar" src="" alt="" hidden>
              <div class="dropdown-avatar-ph" id="dropdown-avatar-ph"></div>
              <div class="dropdown-user-info">
                <span class="dropdown-name"  id="dropdown-name"></span>
                <span class="dropdown-email" id="dropdown-email"></span>
              </div>
            </div>
            <div class="dropdown-divider"></div>

            <!-- Language selector -->
            <div class="dropdown-lang">
              <span class="dropdown-lang-label" data-i18n="profile.language">Idioma</span>
              <div class="lang-btns">
                <button class="lang-btn" data-lang="es">🇪🇸 ES <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="fr">🇫🇷 FR <span class="lang-check">✓</span></button>
              </div>
            </div>
            <div class="dropdown-divider"></div>

            <!-- Configuración -->
            <a href="/settings" class="dropdown-item" onclick="sessionStorage.setItem('settings_referrer', window.location.href)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span data-i18n="profile.settings">Configuración</span>
            </a>
            <div class="dropdown-divider"></div>

            <!-- Gestionar acceso (oculto para readers) -->
            <div id="manage-section">
              <button class="dropdown-item" id="btn-manage">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <span data-i18n="profile.manage">Gestionar acceso</span>
              </button>
              <div class="dropdown-divider"></div>
            </div>

            <!-- Cerrar sesión -->
            <button class="dropdown-item dropdown-item-danger" id="btn-logout">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span data-i18n="profile.logout">Cerrar sesión</span>
            </button>
          </div>
        </div>

      </div>
    </div>
  </header>

  <main class="main">

    <!-- ===== STATS ===== -->
    <section class="stats-section">
      <div class="stat-card">
        <div class="stat-icon-wrap stat-blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <div class="stat-body">
          <span class="stat-value" id="stat-total">—</span>
          <span class="stat-label" data-i18n="inventory.stats.total">Total productos</span>
        </div>
      </div>

      <div class="stat-card stat-card-danger">
        <div class="stat-icon-wrap stat-red">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="stat-body">
          <span class="stat-value" id="stat-critical">—</span>
          <span class="stat-label" data-i18n="inventory.stats.critical">Stock crítico</span>
        </div>
      </div>

      <div class="stat-card stat-categories-card">
        <p class="stat-cats-title" data-i18n="inventory.stats.byCategory">Por categoría</p>
        <div id="stat-categories" class="cat-stats-grid"></div>
      </div>
    </section>

    <!-- ===== FILTROS ===== -->
    <section class="filters-section">
      <div class="tabs-scroll">
        <div class="tabs-wrap" id="category-tabs">
          <button class="tab-btn active" data-category="all" data-i18n="inventory.tabs.all">Todos</button>
          <button class="tab-btn" data-category="Alimentos" data-i18n="inventory.tabs.Alimentos">🍎 Alimentos</button>
          <button class="tab-btn" data-category="Aseo"      data-i18n="inventory.tabs.Aseo">🧼 Aseo</button>
          <button class="tab-btn" data-category="Alacena"   data-i18n="inventory.tabs.Alacena">🏺 Alacena</button>
          <button class="tab-btn" data-category="Bebidas"   data-i18n="inventory.tabs.Bebidas">🥤 Bebidas</button>
          <button class="tab-btn" data-category="Otros"     data-i18n="inventory.tabs.Otros">📦 Otros</button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" class="search-input"
               data-i18n-ph="inventory.search"
               placeholder="Buscar producto..." autocomplete="off">
      </div>
    </section>

    <!-- ===== PRODUCTOS ===== -->
    <section class="products-section">
      <div class="products-grid" id="products-grid"></div>
      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-icon">📦</div>
        <h3 data-i18n="inventory.empty.title">Sin productos</h3>
        <p data-i18n="inventory.empty.sub">No hay productos en esta categoría.<br>Agrega uno con el botón de arriba.</p>
      </div>
    </section>

  </main>

  <!-- ===== MODAL: Agregar/Editar producto ===== -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title" data-i18n="inventory.modal.addTitle">Agregar producto</h2>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form class="modal-form" id="product-form" novalidate>
        <input type="hidden" id="product-id">
        <input type="hidden" id="f-catalog-product-id">

        <!-- Catalog product select — add mode only -->
        <div class="form-group" id="fg-catalog-select">
          <label class="form-label" for="f-catalog-product" data-i18n="inventory.modal.product">Producto</label>
          <select class="form-select" id="f-catalog-product">
            <!-- populated dynamically -->
          </select>
        </div>

        <!-- Name — edit mode or custom product -->
        <div class="form-group" id="fg-name" hidden>
          <label class="form-label" for="f-name" data-i18n="inventory.modal.name">Nombre del producto</label>
          <input class="form-input" type="text" id="f-name"
                 data-i18n-ph="inventory.modal.namePlaceholder"
                 placeholder="Ej: Aceite de oliva" maxlength="100" autocomplete="off">
        </div>

        <!-- Category — edit mode or custom product -->
        <div class="form-group" id="fg-category" hidden>
          <label class="form-label" for="f-category" data-i18n="inventory.modal.category">Categoría</label>
          <select class="form-select" id="f-category">
            <!-- populated dynamically -->
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-current" data-i18n="inventory.modal.currentQty">Cantidad actual</label>
            <input class="form-input" type="number" id="f-current" min="0" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-min" data-i18n="inventory.modal.minQty">Cantidad mínima</label>
            <input class="form-input" type="number" id="f-min" min="0" step="0.01" placeholder="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-unit" data-i18n="inventory.modal.unit">Unidad de medida</label>
          <select class="form-select" id="f-unit">
            <!-- populated dynamically -->
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel" data-i18n="inventory.modal.cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save" data-i18n="inventory.modal.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: Gestionar acceso ===== -->
  <div class="modal-overlay" id="access-overlay" hidden>
    <div class="modal modal-access" role="dialog" aria-labelledby="access-title">
      <div class="modal-header">
        <h2 class="modal-title" id="access-title" data-i18n="inventory.access.title">Gestionar acceso</h2>
        <button class="modal-close" id="access-close" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="access-body">

        <div class="access-section">
          <h3 class="access-section-title" data-i18n="inventory.access.members">Colaboradores</h3>
          <div id="members-list" class="members-list"></div>
        </div>

        <div class="access-section" id="codes-section" hidden>
          <h3 class="access-section-title" data-i18n="inventory.access.codes">Códigos de invitación activos</h3>
          <div id="codes-list" class="codes-list"></div>
          <div class="generate-row" id="generate-row">
            <select class="form-select select-sm" id="invite-role">
              <option value="editor" data-i18n="roles.editor">Editor</option>
              <option value="reader" data-i18n="roles.reader">Lector</option>
            </select>
            <button class="btn btn-primary btn-sm" id="btn-gen-code" data-i18n="inventory.access.genCode">+ Generar código</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
