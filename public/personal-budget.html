<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto Personal</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/personal-budget.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#082F49">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/inventories" class="btn-back" title="Inventarios">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span class="btn-back-label" data-i18n="personalBudget.back">Inventarios</span>
        </a>
        <div class="header-brand">
          <div class="header-wordmark">IH</div>
          <h1 class="header-title" data-i18n="personalBudget.title">Presupuesto Personal</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <button class="profile-btn" id="profile-btn" aria-label="Menú de usuario" aria-expanded="false">
            <img class="user-avatar" id="user-avatar" src="" alt="" hidden>
            <div class="avatar-placeholder" id="avatar-placeholder"></div>
          </button>
          <div class="profile-dropdown" id="profile-dropdown" hidden>
            <div class="dropdown-header">
              <img class="dropdown-avatar" id="dropdown-avatar" src="" alt="" hidden>
              <div class="dropdown-avatar-ph" id="dropdown-avatar-ph"></div>
              <div class="dropdown-user-info">
                <span class="dropdown-name"  id="dropdown-name"></span>
                <span class="dropdown-email" id="dropdown-email"></span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-lang">
              <span class="dropdown-lang-label" data-i18n="profile.language">Idioma</span>
              <div class="lang-btns">
                <button class="lang-btn" data-lang="es">ES <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="en">EN <span class="lang-check">✓</span></button>
                <button class="lang-btn" data-lang="fr">FR <span class="lang-check">✓</span></button>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item dropdown-item-danger" id="btn-logout">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span data-i18n="profile.logout">Cerrar sesión</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="inv-panel">

      <!-- Month selector + range -->
      <div class="pb-month-bar" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
        <span class="pb-month-title" data-i18n="personalBudget.title">Presupuesto Personal</span>
        <div class="pb-month-bar-right">
          <select id="pb-range" class="pb-month-input" aria-label="Rango">
            <option value="1" selected>Este mes</option>
            <option value="3">Últimos 3 meses</option>
            <option value="6">Últimos 6 meses</option>
          </select>
          <input type="month" id="pb-month" class="pb-month-input" aria-label="Mes">
          <a href="/personal-budget/settings" class="btn-icon-sm" title="Configuración" aria-label="Configuración del presupuesto">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </a>
        </div>
      </div>

      <!-- KPIs: 3 tarjetas compactas dual-nivel (Real + Proyectado) -->
      <div class="pb-kpi-row">

        <!-- Ingresos -->
        <div class="pb-kpi-card pb-kpi-income pb-kpi-card--loading">
          <span class="pb-kpi-label" data-i18n="personalBudget.summary.income">Ingresos</span>
          <span class="pb-kpi-real pb-kpi-real--income pb-skeleton-line pb-skeleton-value" id="pb-income-real">—</span>
          <span class="pb-kpi-sub pb-skeleton-line pb-skeleton-sub">
            <span data-i18n="personalBudget.summary.labelProjected">Proyectado</span>:
            <span id="pb-income-proj">—</span>
          </span>
        </div>

        <!-- Gastos -->
        <div class="pb-kpi-card pb-kpi-expense pb-kpi-card--loading">
          <span class="pb-kpi-label" data-i18n="personalBudget.summary.expense">Gastos</span>
          <span class="pb-kpi-real pb-kpi-real--expense pb-skeleton-line pb-skeleton-value" id="pb-expense-real">—</span>
          <span class="pb-kpi-sub pb-skeleton-line pb-skeleton-sub">
            <span data-i18n="personalBudget.summary.labelProjected">Proyectado</span>:
            <span id="pb-expense-proj">—</span>
          </span>
        </div>

        <!-- Balance + Neto proyectado inline -->
        <div class="pb-kpi-card pb-kpi-balance pb-kpi-card--loading">
          <div class="pb-kpi-balance-header">
            <span class="pb-kpi-label" data-i18n="personalBudget.summary.balance">Balance</span>
            <div style="display:flex;align-items:center;gap:.35rem">
              <span id="pb-deviation-badge" class="pb-deviation-badge" hidden></span>
              <div class="pb-kpi-net-badge">
                <span id="pb-weekly-amount" class="pb-kpi-net-amount">—</span>
                <select id="pb-period-selector" class="pb-period-mini" aria-label="Periodo">
                  <option value="biweekly" data-i18n="personalBudget.cashflow.periodBiweekly">Quincenal</option>
                  <option value="monthly"  data-i18n="personalBudget.cashflow.periodMonthly">Mensual</option>
                </select>
              </div>
            </div>
          </div>
          <span class="pb-kpi-real" id="pb-balance-real">—</span>
          <span class="pb-kpi-sub">
            <span data-i18n="personalBudget.summary.labelProjected">Proyectado</span>:
            <span id="pb-balance-proj">—</span>
          </span>
          <div class="pb-progress-wrap" id="pb-progress-wrap" hidden>
            <div class="pb-progress-track">
              <div class="pb-progress-month" id="pb-progress-month" style="width:0%"></div>
              <div class="pb-progress-spent" id="pb-progress-spent" style="width:0%"></div>
            </div>
            <div class="pb-progress-labels">
              <span id="pb-progress-label-month" class="pb-progress-label"></span>
              <span id="pb-progress-label-spent" class="pb-progress-label"></span>
            </div>
          </div>
          <p id="pb-projection-hint" class="pb-projection-hint" hidden></p>
        </div>

      </div>

      <!-- Distribución de gastos por categoría -->
      <div class="dash-card pb-chart-card" id="pb-chart-card" hidden>
        <div class="pb-chart-header">
          <span class="pb-chart-title" data-i18n="personalBudget.chart.title">Distribución de Gastos</span>
          <span class="pb-chart-period" id="pb-chart-period"></span>
        </div>
        <div class="pb-chart-body">
          <div class="pb-chart-wrap">
            <canvas id="pb-donut-canvas" width="200" height="200"></canvas>
          </div>
          <div class="pb-chart-legend" id="pb-chart-legend"></div>
        </div>
      </div>

      <!-- Historial y Planificación (tabbed) -->
      <div class="dash-card" id="pb-history-card">
        <div class="pb-tabs-header">
          <div class="pb-tabs" role="tablist">
            <button class="pb-tab pb-tab--active" data-tab="transactions" role="tab" aria-selected="true">
              <span data-i18n="personalBudget.tabs.transactions">Transacciones del Mes</span>
            </button>
            <button class="pb-tab" data-tab="fixed" role="tab" aria-selected="false">
              <span data-i18n="personalBudget.tabs.fixed">Flujos Proyectados</span>
            </button>
          </div>
          <div class="pb-search-wrap">
            <svg class="pb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="pb-search" class="pb-search-input" placeholder="Buscar por categoría…" autocomplete="off">
          </div>
          <div class="pb-toolbar" id="pb-toolbar">
            <div class="pb-action-group">
              <div class="pb-dropdown" id="pb-dropdown">
                <button type="button" class="pb-icon-btn pb-icon-btn--primary" id="pb-btn-new-record" title="Nuevo Registro" aria-label="Nuevo Registro">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  <svg class="pb-dropdown-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="pb-dropdown-menu" id="pb-dropdown-menu" hidden>
                  <button class="pb-dropdown-item" data-record-type="income_real">
                    <span class="pb-dropdown-icon pb-dropdown-icon--income">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    </span>
                    <span data-i18n="personalBudget.form.rt.incomeReal">Ingreso Real</span>
                  </button>
                  <button class="pb-dropdown-item" data-record-type="expense_real">
                    <span class="pb-dropdown-icon pb-dropdown-icon--expense">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                    </span>
                    <span data-i18n="personalBudget.form.rt.expenseReal">Gasto Real</span>
                  </button>
                  <hr class="pb-dropdown-divider">
                  <button class="pb-dropdown-item" data-record-type="income_projected">
                    <span class="pb-dropdown-icon pb-dropdown-icon--projected-income">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="8 14 10.5 16.5 16 12"/></svg>
                    </span>
                    <span data-i18n="personalBudget.form.rt.incomeProjected">Ingreso Proyectado</span>
                  </button>
                  <button class="pb-dropdown-item" data-record-type="expense_projected">
                    <span class="pb-dropdown-icon pb-dropdown-icon--projected-expense">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="16" x2="15" y2="16"/><line x1="12" y1="13" x2="12" y2="19"/></svg>
                    </span>
                    <span data-i18n="personalBudget.form.rt.expenseProjected">Gasto Proyectado</span>
                  </button>
                </div>
              </div>
              <button class="pb-icon-btn" id="pb-btn-edit" disabled title="Editar" aria-label="Editar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="pb-icon-btn pb-icon-btn--pay" id="pb-btn-pay" disabled hidden title="Pagar" aria-label="Pagar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
              </button>
              <button class="pb-icon-btn pb-icon-btn--danger" id="pb-btn-delete" disabled title="Eliminar" aria-label="Eliminar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Panel: Transacciones -->
        <div class="pb-tab-panel" id="pb-panel-transactions">
          <div id="pb-table-wrap"><!-- rendered by JS --></div>
        </div>

        <!-- Panel: Gastos Fijos -->
        <div class="pb-tab-panel pb-tab-panel--hidden" id="pb-panel-fixed">
          <div class="pb-table-scroll">
            <table class="pb-tx-table pb-fc-table">
              <thead>
                <tr>
                  <th class="pb-col-radio"></th>
                  <th class="pb-col-type-filter">
                    <select id="pb-fc-filter-type" class="pb-fc-filter-select">
                      <option value="all"     data-i18n="personalBudget.fixedList.filterAll">Tipo (Todos)</option>
                      <option value="income"  data-i18n="personalBudget.fixedList.filterIncome">Ingresos</option>
                      <option value="expense" data-i18n="personalBudget.fixedList.filterExpense">Gastos</option>
                    </select>
                  </th>
                  <th data-i18n="personalBudget.fixedList.colCategory">Categoría</th>
                  <th class="pb-col-type-filter">
                    <select id="pb-fc-filter-freq" class="pb-fc-filter-select">
                      <option value="all"       data-i18n="personalBudget.fixedList.filterFreqAll">Frecuencia</option>
                      <option value="Mensual"   data-i18n="personalBudget.fixed.freqMonthly">Mensual</option>
                      <option value="Quincenal" data-i18n="personalBudget.fixed.freqBiweekly">Quincenal</option>
                      <option value="Semestral" data-i18n="personalBudget.fixed.freqSemestral">Semestral</option>
                      <option value="Anual"     data-i18n="personalBudget.fixed.freqAnnual">Anual</option>
                      <option value="Bianual"   data-i18n="personalBudget.fixed.freqBiannual">Bianual</option>
                    </select>
                  </th>
                  <th data-i18n="personalBudget.fixedList.colDue">Vence</th>
                  <th data-i18n="personalBudget.fixedList.colBiweekly">Quincena</th>
                  <th data-i18n="personalBudget.fixedList.colMonthly">Mensual</th>
                  <th data-i18n="personalBudget.fixedList.colAnnual">Anual</th>
                </tr>
              </thead>
              <tbody id="pb-fixed-costs-list"><!-- rendered by JS --></tbody>
              <tfoot id="pb-fixed-costs-foot" hidden></tfoot>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- ===== FORM MODAL ===== -->
  <div id="pb-form-modal" class="pb-modal-overlay" hidden aria-modal="true" role="dialog">
    <div class="pb-modal">
      <div class="pb-modal-header">
        <h2 class="pb-modal-title" id="pb-modal-title" data-i18n="personalBudget.form.title">Registrar transacción</h2>
        <button class="pb-modal-close" id="pb-modal-close" aria-label="Cerrar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="pb-modal-body">
        <form id="pb-form" novalidate>
          <div class="pb-form-grid">

            <div class="form-group pb-form-full">
              <label class="form-label" for="pb-record-type" data-i18n="personalBudget.form.recordType">Tipo de registro</label>
              <select class="form-select" id="pb-record-type">
                <option value="income_real"       data-i18n="personalBudget.form.rt.incomeReal">Ingreso Real</option>
                <option value="expense_real"      data-i18n="personalBudget.form.rt.expenseReal">Gasto Real</option>
                <option value="income_projected"  data-i18n="personalBudget.form.rt.incomeProjected">Ingreso Proyectado</option>
                <option value="expense_projected" data-i18n="personalBudget.form.rt.expenseProjected">Gasto Proyectado</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="pb-category">
                <span data-i18n="personalBudget.form.category">Categoría</span>
                <span class="req">*</span>
              </label>
              <input class="form-input" type="text" id="pb-category" maxlength="80"
                     data-i18n-ph="personalBudget.form.categoryPlaceholder"
                     placeholder="Ej: Salario, Alquiler..." autocomplete="off" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="pb-amount">
                <span data-i18n="personalBudget.form.amount">Monto</span>
                <span class="req">*</span>
              </label>
              <input class="form-input" type="number" id="pb-amount" min="0.01" step="0.01"
                     data-i18n-ph="personalBudget.form.amountPlaceholder"
                     placeholder="0.00" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="pb-date">
                <span data-i18n="personalBudget.form.date">Fecha</span>
                <span class="req">*</span>
              </label>
              <input class="form-input" type="date" id="pb-date" required>
            </div>

            <div class="form-group" id="pb-inventory-group">
              <label class="form-label" for="pb-inventory" data-i18n="personalBudget.form.inventory">Inventario (opcional)</label>
              <select class="form-select" id="pb-inventory">
                <option value="" data-i18n="personalBudget.form.inventoryNone">Ninguno</option>
              </select>
            </div>

            <div class="form-group" id="pb-freq-group" hidden>
              <label class="form-label" for="pb-freq" data-i18n="personalBudget.fixed.frequency">Frecuencia</label>
              <select class="pb-fixed-freq-select" id="pb-freq">
                <option value="Mensual"   data-i18n="personalBudget.fixed.freqMonthly">Mensual</option>
                <option value="Quincenal" data-i18n="personalBudget.fixed.freqBiweekly">Quincenal</option>
                <option value="Semestral" data-i18n="personalBudget.fixed.freqSemestral">Semestral</option>
                <option value="Anual"     data-i18n="personalBudget.fixed.freqAnnual">Anual</option>
                <option value="Bianual"   data-i18n="personalBudget.fixed.freqBiannual">Bianual</option>
              </select>
            </div>

            <div class="form-group" id="pb-due-group" hidden>
              <label class="form-label" for="pb-due-date">
                <span data-i18n="personalBudget.fixed.dueDate">Día / Fecha de vencimiento</span>
              </label>
              <input class="form-input" type="text" id="pb-due-date"
                     data-i18n-ph="personalBudget.fixed.dueDatePh"
                     placeholder="05 o 2026-11-15" maxlength="10" autocomplete="off">
              <small class="field-hint" data-i18n="personalBudget.fixed.dueDateHint">Día del mes "05" o fecha exacta YYYY-MM-DD</small>
            </div>

            <div class="form-group pb-form-full">
              <label class="form-label" for="pb-description" data-i18n="personalBudget.form.description">Descripción</label>
              <input class="form-input" type="text" id="pb-description" maxlength="200"
                     data-i18n-ph="personalBudget.form.descriptionPlaceholder"
                     placeholder="Opcional" autocomplete="off">
            </div>

            <div class="pb-form-full pb-modal-footer">
              <button type="button" class="btn btn-ghost" id="pb-cancel" data-i18n="personalBudget.form.toolbar.cancel">Cancelar</button>
              <button type="submit" class="btn btn-primary" id="pb-submit" data-i18n="personalBudget.form.submit">Guardar</button>
            </div>

          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/vendor/chart.umd.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/personal-budget.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
