<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuotas</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#082F49">
  <style>
    /* layout */
    .cq-wrap { max-width: 720px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
    .cq-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: .75rem;
    }
    .cq-toolbar-title { font-size: 1.05rem; font-weight: 700; color: #082F49; }

    /* button — override global reset explícitamente */
    .cq-btn-add {
      -webkit-appearance: none; appearance: none;
      display: inline-flex; align-items: center; gap: .4rem;
      background-color: #082F49; color: #fff;
      border: none; border-radius: 8px;
      padding: .45rem .9rem; font-size: .85rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .cq-btn-add:hover { background-color: #0c4a6e; }
    .cq-btn-add svg { display: inline; vertical-align: middle; }

    /* cards */
    .cq-plan-list { display: flex; flex-direction: column; gap: 1rem; }
    .cq-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .cq-card-head { padding: 1rem 1.25rem .75rem; border-bottom: 1px solid #f1f5f9; }
    .cq-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
    .cq-card-name { font-size: 1rem; font-weight: 700; color: #082F49; margin: 0 0 .15rem; }
    .cq-card-cat  { font-size: .75rem; color: #64748b; }
    .cq-card-meta { font-size: .8rem; color: #475569; margin-top: .35rem; }
    .cq-card-meta strong { color: #082F49; }

    .cq-btn-delete {
      -webkit-appearance: none; appearance: none;
      background: none; border: none; cursor: pointer; color: #94a3b8;
      padding: .25rem; border-radius: 4px; flex-shrink: 0;
    }
    .cq-btn-delete:hover { color: #ef4444; background: #fef2f2; }

    /* progress */
    .cq-progress-wrap { margin-top: .75rem; }
    .cq-progress-label { display: flex; justify-content: space-between; font-size: .78rem; color: #64748b; margin-bottom: .3rem; }
    .cq-progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .cq-progress-fill { height: 100%; background: #16a34a; border-radius: 3px; }

    /* payment rows */
    .cq-payments { padding: .25rem 0; }
    .cq-payment-row {
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
      padding: .5rem 1.25rem; border-bottom: 1px solid #f8fafc;
      font-size: .82rem;
    }
    .cq-payment-row:last-child { border-bottom: none; }
    .cq-payment-num { font-weight: 700; color: #94a3b8; min-width: 1.5rem; text-align: center; flex-shrink: 0; }
    .cq-payment-info { flex: 1; min-width: 0; }
    .cq-payment-amt  { font-weight: 600; color: #334155; }
    .cq-payment-date { color: #94a3b8; font-size: .76rem; }
    .cq-payment-tx   { color: #0ea5e9; font-size: .76rem; }

    .cq-badge-paid    { background: #dcfce7; color: #16a34a; border-radius: 4px; padding: .15rem .45rem; font-size: .72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .cq-badge-pending { background: #fef9c3; color: #a16207; border-radius: 4px; padding: .15rem .45rem; font-size: .72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }

    .cq-payment-actions { display: flex; gap: .3rem; flex-shrink: 0; }
    .cq-btn-sm {
      -webkit-appearance: none; appearance: none;
      border-radius: 6px; padding: .22rem .55rem; font-size: .73rem;
      cursor: pointer; white-space: nowrap; border: 1px solid #e2e8f0;
      background: #fff; color: #475569;
    }
    .cq-btn-sm:hover { background: #f1f5f9; }
    .cq-btn-sm--pay    { border-color: #16a34a; color: #16a34a; }
    .cq-btn-sm--unpay  { border-color: #94a3b8; color: #64748b; }
    .cq-btn-sm--link   { border-color: #0ea5e9; color: #0ea5e9; }
    .cq-btn-sm--unlink { border-color: #f97316; color: #f97316; }

    /* empty */
    .cq-empty { text-align: center; padding: 4rem 1.5rem; color: #94a3b8; }
    .cq-empty svg { margin: 0 auto 1rem; opacity: .35; }
    .cq-empty-title { font-size: 1rem; font-weight: 600; color: #475569; margin-bottom: .5rem; }
    .cq-empty-desc  { font-size: .88rem; max-width: 300px; margin: 0 auto; }

    /* modal */
    .cq-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 1rem;
    }
    .cq-modal {
      background: #fff; border-radius: 14px;
      width: 100%; max-width: 440px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .cq-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem .85rem; border-bottom: 1px solid #f1f5f9;
    }
    .cq-modal-title { font-size: 1rem; font-weight: 700; color: #082F49; margin: 0; }
    .cq-modal-close {
      -webkit-appearance: none; appearance: none;
      background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #94a3b8;
    }
    .cq-modal-body { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: .8rem; }
    .cq-field label { display: block; font-size: .78rem; font-weight: 600; color: #475569; margin-bottom: .3rem; }
    .cq-field input, .cq-field select {
      width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0;
      border-radius: 7px; padding: .5rem .75rem; font-size: .88rem;
      color: #1e293b; background: #fff;
    }
    .cq-field input:focus, .cq-field select:focus { outline: none; border-color: #082F49; }
    .cq-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .cq-calc-hint { font-size: .78rem; color: #16a34a; font-weight: 600; }
    .cq-modal-foot {
      display: flex; gap: .6rem; justify-content: flex-end;
      padding: .85rem 1.25rem 1rem; border-top: 1px solid #f1f5f9;
    }
    .cq-btn-cancel {
      -webkit-appearance: none; appearance: none;
      background: #f1f5f9; color: #475569; border: none; border-radius: 8px;
      padding: .45rem .9rem; font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    .cq-btn-save {
      -webkit-appearance: none; appearance: none;
      background-color: #082F49; color: #fff; border: none; border-radius: 8px;
      padding: .45rem 1rem; font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    .cq-btn-save:disabled { opacity: .5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .cq-field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/personal-budget" class="btn-back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span class="btn-back-label">Presupuesto</span>
        </a>
        <div class="header-brand">
          <div class="header-wordmark">IH</div>
          <h1 class="header-title">Cuotas</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="profile-menu-wrap" id="profile-menu-wrap">
          <button class="profile-btn" id="profile-btn" aria-label="Menú de usuario" aria-expanded="false">
            <img class="user-avatar" id="user-avatar" src="" alt="" hidden>
            <div class="avatar-placeholder" id="avatar-placeholder"></div>
          </button>
          <div class="profile-dropdown" id="profile-dropdown" hidden>
            <div class="dropdown-header">
              <img class="dropdown-avatar" id="dropdown-avatar" src="" alt="" hidden>
              <div class="dropdown-avatar-ph" id="dropdown-avatar-ph"></div>
              <div class="dropdown-user-info">
                <span class="dropdown-name" id="dropdown-name"></span>
                <span class="dropdown-email" id="dropdown-email"></span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item dropdown-item-danger" id="btn-logout">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span>Cerrar sesión</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="cq-wrap">
      <div class="cq-toolbar">
        <span class="cq-toolbar-title">Cuotas</span>
        <button class="cq-btn-add" id="btn-add-plan">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display:inline;vertical-align:middle"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva cuota
        </button>
      </div>
      <div id="cq-list" class="cq-plan-list"></div>
    </div>
  </main>

  <!-- modal: nuevo plan -->
  <div class="cq-overlay" id="modal-add" hidden>
    <div class="cq-modal">
      <div class="cq-modal-head">
        <h2 class="cq-modal-title">Nueva cuota</h2>
        <button class="cq-modal-close" id="modal-add-close">&#x2715;</button>
      </div>
      <div class="cq-modal-body">
        <div class="cq-field">
          <label>Nombre *</label>
          <input type="text" id="f-name" placeholder="TV Samsung, Notebook...">
        </div>
        <div class="cq-field-row">
          <div class="cq-field">
            <label>Monto total *</label>
            <input type="number" id="f-total" min="0.01" step="0.01" placeholder="0.00">
          </div>
          <div class="cq-field">
            <label>N&uacute;m. cuotas *</label>
            <input type="number" id="f-num" min="1" max="360" step="1" placeholder="12">
          </div>
        </div>
        <div class="cq-calc-hint" id="f-calc" hidden></div>
        <div class="cq-field">
          <label>Fecha primera cuota *</label>
          <input type="date" id="f-start">
        </div>
        <div class="cq-field">
          <label>Categor&iacute;a (opcional)</label>
          <input type="text" id="f-category" placeholder="Electr&oacute;nica, Hogar...">
        </div>
        <div class="cq-field">
          <label>Notas (opcional)</label>
          <input type="text" id="f-notes" placeholder="Banco, tarjeta...">
        </div>
      </div>
      <div class="cq-modal-foot">
        <button class="cq-btn-cancel" id="modal-add-cancel">Cancelar</button>
        <button class="cq-btn-save" id="modal-add-save">Crear plan</button>
      </div>
    </div>
  </div>

  <!-- modal: enlazar transacción -->
  <div class="cq-overlay" id="modal-link" hidden>
    <div class="cq-modal">
      <div class="cq-modal-head">
        <h2 class="cq-modal-title">Enlazar transacci&oacute;n</h2>
        <button class="cq-modal-close" id="modal-link-close">&#x2715;</button>
      </div>
      <div class="cq-modal-body">
        <p style="font-size:.82rem;color:#64748b;margin:0">Seleccion&aacute; una transacci&oacute;n de gasto para enlazarla.</p>
        <div class="cq-field">
          <select id="f-link-tx">
            <option value="">— Seleccionar transacci&oacute;n —</option>
          </select>
        </div>
      </div>
      <div class="cq-modal-foot">
        <button class="cq-btn-cancel" id="modal-link-cancel">Cancelar</button>
        <button class="cq-btn-save" id="modal-link-save">Enlazar</button>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/sw-register.js"></script>
  <script>
  'use strict';

  // ── utilidades ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg, type) {
    try {
      const el = document.createElement('div');
      el.className = 'toast toast--' + (type || 'success');
      el.textContent = msg;
      document.body.appendChild(el);
      requestAnimationFrame(function() { el.classList.add('toast--show'); });
      setTimeout(function() { el.classList.remove('toast--show'); setTimeout(function() { el.remove(); }, 300); }, 3000);
    } catch(e) { console.error('toast error', e); }
  }
  function fmt(n) {
    return typeof n === 'number'
      ? n.toLocaleString('es', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '—';
  }
  function fmtDate(d) {
    if (!d) return '—';
    var p = d.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  // ── estado ─────────────────────────────────────────────────────────────────
  var _plans = [];
  var _transactions = [];
  var _linkCtx = null;

  // ── render ─────────────────────────────────────────────────────────────────
  function render() {
    try {
      var el = document.getElementById('cq-list');
      if (!el) return;

      if (!_plans.length) {
        el.innerHTML = [
          '<div class="cq-empty">',
          '<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">',
          '<rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
          '<p class="cq-empty-title">No tenés cuotas registradas</p>',
          '<p class="cq-empty-desc">Registrá tus compras en cuotas para hacer un seguimiento de los pagos pendientes.</p>',
          '</div>'
        ].join('');
        return;
      }

      el.innerHTML = _plans.map(function(plan) {
        var paidCount = plan.paid_count || 0;
        var total     = plan.num_installments || 0;
        var pct       = total > 0 ? Math.round((paidCount / total) * 100) : 0;
        var remaining = (total - paidCount) * (plan.amount_per_installment || 0);

        var rows = (plan.payments || []).map(function(pay) {
          var isPaid    = !!pay.paid_at;
          var badge     = isPaid
            ? '<span class="cq-badge-paid">Pagada</span>'
            : '<span class="cq-badge-pending">Pendiente</span>';
          var dateLabel = isPaid
            ? 'Pagada el ' + fmtDate(pay.paid_at)
            : 'Vence ' + fmtDate(pay.due_date);
          var txLine = pay.transaction_id
            ? '<div class="cq-payment-tx">🔗 ' + esc(pay.tx_description || '') + ' ' + (pay.tx_amount != null ? fmt(pay.tx_amount) : '') + '</div>'
            : '';

          var actions = '';
          if (isPaid) {
            actions += '<button class="cq-btn-sm cq-btn-sm--unpay" data-plan="' + plan.id + '" data-num="' + pay.installment_number + '">Desmarcar</button>';
            actions += pay.transaction_id
              ? '<button class="cq-btn-sm cq-btn-sm--unlink" data-plan="' + plan.id + '" data-num="' + pay.installment_number + '">Desenlazar</button>'
              : '<button class="cq-btn-sm cq-btn-sm--link" data-plan="' + plan.id + '" data-num="' + pay.installment_number + '">Enlazar tx</button>';
          } else {
            actions += '<button class="cq-btn-sm cq-btn-sm--pay" data-plan="' + plan.id + '" data-num="' + pay.installment_number + '">Pagar</button>';
            actions += '<button class="cq-btn-sm cq-btn-sm--link" data-plan="' + plan.id + '" data-num="' + pay.installment_number + '">Enlazar tx</button>';
          }

          return [
            '<div class="cq-payment-row">',
            '<span class="cq-payment-num">' + pay.installment_number + '</span>',
            '<div class="cq-payment-info">',
            '<div class="cq-payment-amt">' + fmt(plan.amount_per_installment) + '</div>',
            '<div class="cq-payment-date">' + esc(dateLabel) + '</div>',
            txLine,
            '</div>',
            badge,
            '<div class="cq-payment-actions">' + actions + '</div>',
            '</div>'
          ].join('');
        }).join('');

        return [
          '<div class="cq-card">',
          '<div class="cq-card-head">',
          '<div class="cq-card-top">',
          '<div>',
          '<h3 class="cq-card-name">' + esc(plan.name) + '</h3>',
          plan.category ? '<div class="cq-card-cat">' + esc(plan.category) + '</div>' : '',
          '<div class="cq-card-meta">',
          '<strong>' + fmt(plan.total_amount) + '</strong> total &middot; ',
          total + ' cuotas de <strong>' + fmt(plan.amount_per_installment) + '</strong>',
          remaining > 0 ? ' &middot; <span style="color:#ef4444">' + fmt(remaining) + ' restante</span>' : '',
          '</div></div>',
          '<button class="cq-btn-delete" data-delete="' + plan.id + '" title="Eliminar plan">',
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">',
          '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>',
          '</svg></button>',
          '</div>',
          '<div class="cq-progress-wrap">',
          '<div class="cq-progress-label"><span>' + paidCount + '/' + total + ' pagadas</span><span>' + pct + '%</span></div>',
          '<div class="cq-progress-bar"><div class="cq-progress-fill" style="width:' + pct + '%"></div></div>',
          '</div>',
          '</div>',
          '<div class="cq-payments">' + rows + '</div>',
          '</div>'
        ].join('');
      }).join('');

    } catch(e) {
      console.error('render error:', e);
      var el2 = document.getElementById('cq-list');
      if (el2) el2.innerHTML = '<p style="padding:1rem;color:#ef4444">Error al mostrar cuotas. Recargá la página.</p>';
    }
  }

  // ── API ────────────────────────────────────────────────────────────────────
  function loadPlans() {
    return apiFetch('GET', '/api/personal-budget/installments')
      .then(function(data) { _plans = Array.isArray(data) ? data : []; })
      .catch(function(e) { console.error('loadPlans:', e); showToast('Error al cargar cuotas', 'error'); _plans = []; })
      .then(function() { render(); });
  }

  function loadTransactions() {
    return apiFetch('GET', '/api/personal-budget/')
      .then(function(data) {
        _transactions = (data && data.transactions ? data.transactions : []).filter(function(tx) { return tx.type === 'expense'; });
      })
      .catch(function() { _transactions = []; });
  }

  // ── modal add ──────────────────────────────────────────────────────────────
  function openAddModal() {
    try {
      document.getElementById('f-name').value = '';
      document.getElementById('f-total').value = '';
      document.getElementById('f-num').value = '';
      document.getElementById('f-start').value = new Date().toISOString().slice(0, 10);
      document.getElementById('f-category').value = '';
      document.getElementById('f-notes').value = '';
      document.getElementById('f-calc').hidden = true;
      document.getElementById('modal-add').hidden = false;
      setTimeout(function() { document.getElementById('f-name').focus(); }, 50);
    } catch(e) { console.error('openAddModal:', e); }
  }

  function updateCalcHint() {
    try {
      var total = parseFloat(document.getElementById('f-total').value);
      var num   = parseInt(document.getElementById('f-num').value, 10);
      var hint  = document.getElementById('f-calc');
      if (total > 0 && num > 0) {
        hint.textContent = '= ' + fmt(parseFloat((total / num).toFixed(2))) + ' por cuota';
        hint.hidden = false;
      } else {
        hint.hidden = true;
      }
    } catch(e) {}
  }

  function saveAddModal() {
    try {
      var name     = document.getElementById('f-name').value.trim();
      var total    = parseFloat(document.getElementById('f-total').value);
      var num      = parseInt(document.getElementById('f-num').value, 10);
      var start    = document.getElementById('f-start').value;
      var category = document.getElementById('f-category').value.trim();
      var notes    = document.getElementById('f-notes').value.trim();
      if (!name || !total || !num || !start) { showToast('Completá los campos obligatorios', 'error'); return; }
      var perInstall = parseFloat((total / num).toFixed(2));
      var saveBtn = document.getElementById('modal-add-save');
      saveBtn.disabled = true;
      apiFetch('POST', '/api/personal-budget/installments', {
        name: name,
        totalAmount: total,
        numInstallments: num,
        amountPerInstallment: perInstall,
        startDate: start,
        category: category || null,
        notes: notes || null
      }).then(function() {
        document.getElementById('modal-add').hidden = true;
        showToast('Plan creado');
        return loadPlans();
      }).catch(function(e) {
        console.error('saveAddModal:', e);
        showToast('Error al crear el plan', 'error');
      }).then(function() { saveBtn.disabled = false; });
    } catch(e) { console.error('saveAddModal sync error:', e); }
  }

  // ── modal link ─────────────────────────────────────────────────────────────
  function openLinkModal(planId, num) {
    _linkCtx = { planId: planId, num: num };
    loadTransactions().then(function() {
      var sel = document.getElementById('f-link-tx');
      sel.innerHTML = '<option value="">— Seleccionar transacción —</option>';
      if (!_transactions.length) {
        sel.innerHTML += '<option disabled>Sin transacciones disponibles</option>';
      } else {
        _transactions.forEach(function(tx) {
          sel.innerHTML += '<option value="' + tx.id + '">' + fmtDate(tx.date) + ' · ' + esc(tx.category) + ' · ' + fmt(tx.amount) + (tx.description ? ' — ' + esc(tx.description) : '') + '</option>';
        });
      }
      document.getElementById('modal-link').hidden = false;
    });
  }

  function saveLinkModal() {
    if (!_linkCtx) return;
    var txId = document.getElementById('f-link-tx').value;
    var planId = _linkCtx.planId;
    var num = _linkCtx.num;
    apiFetch('PUT', '/api/personal-budget/installments/' + planId + '/pay/' + num, {
      transactionId: txId ? Number(txId) : null
    }).then(function() {
      document.getElementById('modal-link').hidden = true;
      return loadPlans();
    }).catch(function(e) {
      console.error('saveLinkModal:', e);
      showToast('Error al enlazar', 'error');
    });
  }

  // ── plan actions ───────────────────────────────────────────────────────────
  function payInstallment(planId, num) {
    apiFetch('PUT', '/api/personal-budget/installments/' + planId + '/pay/' + num, {})
      .then(function() { return loadPlans(); })
      .catch(function() { showToast('Error al pagar cuota', 'error'); });
  }

  function unpayInstallment(planId, num) {
    apiFetch('DELETE', '/api/personal-budget/installments/' + planId + '/pay/' + num)
      .then(function() { return loadPlans(); })
      .catch(function() { showToast('Error al desmarcar', 'error'); });
  }

  function deletePlan(planId) {
    if (!confirm('¿Eliminar este plan? Se borrarán todos los registros de pago.')) return;
    apiFetch('DELETE', '/api/personal-budget/installments/' + planId)
      .then(function() { return loadPlans(); })
      .catch(function() { showToast('Error al eliminar', 'error'); });
  }

  function unlinkTx(planId, num) {
    apiFetch('PUT', '/api/personal-budget/installments/' + planId + '/pay/' + num, { transactionId: null })
      .then(function() { return loadPlans(); })
      .catch(function() { showToast('Error al desenlazar', 'error'); });
  }

  // ── listeners (síncronos — no dependen de init async) ─────────────────────
  document.getElementById('btn-add-plan').onclick    = openAddModal;
  document.getElementById('modal-add-close').onclick  = function() { document.getElementById('modal-add').hidden = true; };
  document.getElementById('modal-add-cancel').onclick = function() { document.getElementById('modal-add').hidden = true; };
  document.getElementById('modal-add-save').onclick   = saveAddModal;
  document.getElementById('modal-link-close').onclick  = function() { document.getElementById('modal-link').hidden = true; };
  document.getElementById('modal-link-cancel').onclick = function() { document.getElementById('modal-link').hidden = true; };
  document.getElementById('modal-link-save').onclick   = saveLinkModal;
  document.getElementById('f-total').oninput = updateCalcHint;
  document.getElementById('f-num').oninput   = updateCalcHint;
  document.getElementById('modal-add').onclick  = function(e) { if (e.target === this) this.hidden = true; };
  document.getElementById('modal-link').onclick = function(e) { if (e.target === this) this.hidden = true; };

  document.getElementById('cq-list').onclick = function(e) {
    var btn = e.target.closest('[data-plan][data-num]');
    var del = e.target.closest('[data-delete]');
    if (del) { deletePlan(Number(del.dataset.delete)); return; }
    if (!btn) return;
    var planId = Number(btn.dataset.plan);
    var num    = Number(btn.dataset.num);
    var cls    = btn.className;
    if (cls.indexOf('cq-btn-sm--pay')    >= 0) payInstallment(planId, num);
    if (cls.indexOf('cq-btn-sm--unpay')  >= 0) unpayInstallment(planId, num);
    if (cls.indexOf('cq-btn-sm--link')   >= 0) openLinkModal(planId, num);
    if (cls.indexOf('cq-btn-sm--unlink') >= 0) unlinkTx(planId, num);
  };

  document.getElementById('btn-logout').onclick = function() {
    fetch('/auth/logout', { method: 'POST' }).then(function() { window.location.href = '/login'; });
  };

  // ── init async ─────────────────────────────────────────────────────────────
  (function init() {
    Promise.resolve()
      .then(function() { return I18N.init(); })
      .catch(function(e) { console.error('I18N.init failed:', e); })
      .then(function() {
        try { initProfileMenu(); } catch(e) { console.error('initProfileMenu:', e); }
        return loadProfileAvatar().catch(function(e) { console.error('loadProfileAvatar:', e); });
      })
      .then(function() { return loadPlans(); })
      .catch(function(e) { console.error('init failed:', e); render(); });
  })();
  </script>
</body>
</html>
