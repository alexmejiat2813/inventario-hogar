<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b;
      min-height: 100vh; padding-bottom: 4rem;
    }
    button, input, select { font: inherit; cursor: pointer; }
    img, svg { display: block; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
    }
    .header-inner {
      max-width: 720px; margin: 0 auto;
      padding: .75rem 1rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .78rem; font-weight: 600; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }
    .header-title-wrap { flex: 1; min-width: 0; }
    .header-inv-name { font-size: .68rem; opacity: .75; font-weight: 500; }
    .header-title {
      font-size: 1rem; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: baseline; gap: .3rem;
    }
    .list-count { font-weight: 500; opacity: .8; font-size: .9rem; }
    .header-actions { display: flex; gap: .4rem; flex-shrink: 0; }
    .btn-register {
      padding: .4rem .75rem; flex-shrink: 0;
      background: rgba(255,255,255,.2); color: white;
      border: 1.5px solid rgba(255,255,255,.4); border-radius: 8px;
      font-size: .78rem; font-weight: 700;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn-register:not(:disabled):hover { background: rgba(255,255,255,.3); }
    .btn-register:disabled { opacity: .4; cursor: not-allowed; }
    .btn-register--active {
      background: rgba(255,255,255,.25);
      border-color: rgba(255,255,255,.7);
    }
    .btn-clear {
      padding: .4rem .65rem; flex-shrink: 0;
      background: rgba(255,255,255,.12); color: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
      font-size: .78rem; font-weight: 600;
      transition: background .15s;
    }
    .btn-clear:hover { background: rgba(255,255,255,.22); }

    /* ── Inv tabs ── */
    .inv-tabs-bar {
      background: white; border-bottom: 1.5px solid #e2e8f0;
      box-shadow: 0 1px 6px rgba(0,0,0,.04);
    }
    .inv-tabs-inner {
      max-width: 720px; margin: 0 auto; padding: 0 1rem;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .inv-tabs-inner::-webkit-scrollbar { display: none; }
    .inv-tab {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .65rem 1rem; font-size: .875rem; font-weight: 600;
      color: #64748b; border-bottom: 2px solid transparent;
      white-space: nowrap; flex-shrink: 0; text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .inv-tab:hover  { color: #1e293b; }
    .inv-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    @media (max-width: 480px) {
      .inv-tab { padding: .6rem .8rem; }
      .tab-label { display: none; }
    }

    /* ── Main ── */
    .main { max-width: 720px; margin: 0 auto; padding: 1rem; }

    /* ── Empty / All-checked states ── */
    .empty-state, .all-checked {
      text-align: center; padding: 4rem 2rem; color: #64748b;
    }
    .empty-icon, .all-checked-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-title { font-size: 1.2rem; font-weight: 800; color: #1e293b; margin-bottom: .5rem; }
    .empty-sub, .all-checked-text { font-size: .875rem; line-height: 1.6; }

    /* ── Category group ── */
    .cat-group { margin-bottom: 1.125rem; }
    .cat-group-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .375rem .75rem; margin-bottom: .375rem;
      background: #e2e8f0; border-radius: 8px;
    }
    .cat-group-icon { font-size: .95rem; }
    .cat-group-name { font-size: .78rem; font-weight: 700; color: #475569; flex: 1; }
    .cat-group-count {
      font-size: .7rem; font-weight: 700;
      background: #cbd5e1; color: #475569;
      padding: .1rem .4rem; border-radius: 999px;
    }
    .cat-group-items {
      background: white; border-radius: 12px;
      border: 1.5px solid #e2e8f0; overflow: hidden;
    }

    /* ── List item ── */
    .list-item { border-bottom: 1px solid #f1f5f9; }
    .list-item:last-child { border-bottom: none; }

    /* Main row */
    .item-main {
      display: flex; align-items: center; gap: .625rem;
      padding: .75rem 1rem .75rem .75rem;
    }

    /* Checkbox */
    .item-check-btn {
      flex-shrink: 0; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .check-circle {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid #cbd5e1; background: white;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .list-item--checked .check-circle {
      background: #16a34a; border-color: #16a34a;
    }

    /* Item body */
    .item-body { flex: 1; min-width: 0; }
    .item-name {
      font-size: .9375rem; font-weight: 700; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block;
    }
    .item-name--checked { color: #94a3b8; text-decoration: line-through; }
    .item-meta { font-size: .75rem; color: #64748b; margin-top: .1rem; display: block; }
    .item-meta strong { color: #1e293b; }
    .item-needed {
      display: inline-flex; align-items: center; gap: .2rem;
      font-size: .73rem; font-weight: 700; color: #dc2626; margin-top: .15rem;
    }

    /* Expand button */
    .item-expand-btn {
      flex-shrink: 0; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: #f8fafc; color: #64748b;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      transition: background .12s, transform .18s;
      padding: 0;
    }
    .item-expand-btn:hover { background: #f1f5f9; }
    .item-expand-btn--open { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
    .item-expand-btn--open svg { transform: rotate(180deg); }
    .item-expand-btn svg { transition: transform .18s; }

    /* Fields row */
    .item-fields {
      padding: .625rem 1rem .875rem 1.75rem;
      background: #f8fafc;
      border-top: 1px solid #f1f5f9;
    }
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem .75rem;
    }
    @media (min-width: 540px) {
      .fields-grid { grid-template-columns: 2fr 1fr 1fr 1fr; }
    }
    .field-col { display: flex; flex-direction: column; gap: .2rem; }
    .field-label {
      font-size: .67rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .field-select, .field-qty, .field-price {
      border: 1.5px solid #e2e8f0; border-radius: 6px;
      padding: .35rem .5rem; font-size: .8rem; font-weight: 600;
      background: white; color: #1e293b; outline: none;
      transition: border-color .12s;
      width: 100%;
    }
    .field-select:focus, .field-qty:focus, .field-price:focus {
      border-color: #2563eb;
    }
    .field-qty-wrap, .field-price-wrap {
      display: flex; align-items: center;
      border: 1.5px solid #e2e8f0; border-radius: 6px;
      background: white; overflow: hidden;
      transition: border-color .12s;
    }
    .field-qty-wrap:focus-within, .field-price-wrap:focus-within { border-color: #2563eb; }
    .field-qty-wrap .field-qty,
    .field-price-wrap .field-price {
      border: none; flex: 1; padding: .35rem .4rem;
      min-width: 0;
    }
    .field-unit, .field-sym {
      padding: 0 .4rem;
      font-size: .72rem; font-weight: 600; color: #64748b;
      white-space: nowrap; background: white;
    }
    .field-subtotal {
      font-size: .85rem; font-weight: 800; color: #1e293b;
      padding: .35rem 0; display: block;
    }
    .field-subtotal--pos { color: #16a34a; }
    .field-tax-row {
      margin-top: .5rem; display: flex; align-items: center; gap: .625rem;
      padding-top: .5rem; border-top: 1px solid #f1f5f9;
    }
    .field-tax-row .field-label { white-space: nowrap; flex-shrink: 0; }

    /* ── Confirmation modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.55); backdrop-filter: blur(3px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: sl-fade .15s ease;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: 1rem; } }
    @keyframes sl-fade { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: white; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 540px;
      max-height: 92vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: sl-up .22s cubic-bezier(.34,1.56,.64,1);
    }
    @media (min-width: 640px) { .modal { border-radius: 20px; animation: sl-scale .18s ease; } }
    @keyframes sl-up    { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes sl-scale { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

    .modal-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 1.25rem 1.5rem .875rem;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .modal-title { font-size: 1.1rem; font-weight: 800; }
    .modal-date  { font-size: .8rem; color: #64748b; margin-top: .2rem; font-weight: 500; }
    .modal-close {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: #f1f5f9; color: #475569;
      border: none; border-radius: 8px; margin-left: .5rem;
    }
    .modal-close:hover { background: #e2e8f0; }

    .modal-body { overflow-y: auto; flex: 1; padding: 1rem 1.5rem; }

    /* Confirm items */
    .confirm-store-group { margin-bottom: 1rem; }
    .confirm-store-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .8rem; font-weight: 700; color: #475569;
      padding: .3rem .5rem; background: #f1f5f9; border-radius: 6px;
      margin-bottom: .375rem;
    }
    .confirm-store-subtotal { font-weight: 800; color: #1e293b; }
    .confirm-item {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: .5rem; padding: .3rem .5rem;
      font-size: .825rem;
    }
    .confirm-item-name { color: #1e293b; font-weight: 600; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .confirm-item-detail { color: #64748b; font-weight: 500; white-space: nowrap; }
    .confirm-item-price  { color: #1e293b; font-weight: 700; white-space: nowrap; margin-left: .5rem; }

    .confirm-total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .875rem .5rem .25rem;
      border-top: 2px solid #e2e8f0; margin-top: .5rem;
      font-weight: 800; font-size: 1rem;
    }
    .confirm-total-amount { color: #2563eb; font-size: 1.15rem; }

    /* Receipt section */
    .receipt-section {
      margin-top: 1rem; padding: .875rem;
      background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 10px;
    }
    .receipt-title {
      font-size: .8rem; font-weight: 700; color: #475569; margin-bottom: .625rem;
    }
    .receipt-pick-btn {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .875rem;
      background: white; color: #2563eb;
      border: 1.5px solid #bfdbfe; border-radius: 8px;
      font-size: .825rem; font-weight: 700;
      transition: background .12s;
    }
    .receipt-pick-btn:hover { background: #eff6ff; }
    .receipt-hint { font-size: .73rem; color: #94a3b8; margin-top: .4rem; }
    .receipt-preview-wrap {
      position: relative; margin-top: .5rem;
      display: inline-block; max-width: 100%;
    }
    .receipt-preview {
      max-width: 100%; max-height: 160px; border-radius: 8px;
      border: 1.5px solid #e2e8f0; display: block;
    }
    .receipt-remove-btn {
      position: absolute; top: -8px; right: -8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #ef4444; color: white; border: none;
      font-size: .8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* Modal footer */
    .modal-foot {
      display: flex; gap: .625rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #f1f5f9; flex-shrink: 0;
    }
    .btn-cancel {
      flex: 1; padding: .65rem;
      background: #f1f5f9; color: #475569;
      border: none; border-radius: 10px;
      font-size: .9rem; font-weight: 600;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-confirm {
      flex: 2; padding: .65rem;
      background: #2563eb; color: white;
      border: none; border-radius: 10px;
      font-size: .9rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-confirm:hover { background: #1d4ed8; }
    .btn-confirm:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 300;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show    { opacity: 1; transform: translateY(0); }
    .toast-success  { background: #16a34a; }
    .toast-error    { background: #dc2626; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventory" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="shopping.back">Volver</span>
      </a>
      <div class="header-title-wrap">
        <div class="header-inv-name" id="inv-name">Inventario</div>
        <div class="header-title">
          🛒 <span data-i18n="shopping.title">Lista de compras</span>
          <span class="list-count" id="list-count"></span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-register" id="btn-register" disabled data-i18n="shopping.registerBtn">Registrar compra</button>
        <button class="btn-clear" id="btn-clear" hidden data-i18n="shopping.clear">Limpiar</button>
      </div>
    </div>
  </header>

  <nav class="inv-tabs-bar">
    <div class="inv-tabs-inner">
      <a href="/inventory" class="inv-tab">
        <span>📊</span><span class="tab-label" data-i18n="invTabs.dashboard">Dashboard</span>
      </a>
      <a href="/inventory?tab=stock" class="inv-tab">
        <span>📦</span><span class="tab-label" data-i18n="invTabs.stock">Stock</span>
      </a>
      <span class="inv-tab active">
        <span>🛒</span><span class="tab-label" data-i18n="invTabs.shopping">Compras</span>
      </span>
      <a href="/history" class="inv-tab">
        <span>📋</span><span class="tab-label" data-i18n="invTabs.history">Historial</span>
      </a>
    </div>
  </nav>

  <main class="main">
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">✅</div>
      <h2 class="empty-title" data-i18n="shopping.empty.title">¡Todo está bien abastecido!</h2>
      <p class="empty-sub" data-i18n="shopping.empty.sub">Ningún producto está por debajo del mínimo.</p>
    </div>
    <div id="shopping-list"></div>
  </main>

  <!-- Modal: confirmar compra -->
  <div class="modal-overlay" id="confirm-overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" data-i18n="shopping.register.title">Confirmar compra</h2>
          <p class="modal-date" id="confirm-date"></p>
        </div>
        <button class="modal-close" id="btn-confirm-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="confirm-summary"></div>
        <div class="receipt-section">
          <p class="receipt-title" data-i18n="shopping.register.receipt">Foto del recibo (opcional)</p>
          <input type="file" id="receipt-input" accept="image/*" capture="environment" style="display:none">
          <div id="receipt-pick-wrap">
            <button type="button" class="receipt-pick-btn" id="btn-receipt-pick">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span data-i18n="shopping.register.receiptBtn">📷 Tomar foto o subir imagen</span>
            </button>
            <p class="receipt-hint" data-i18n="shopping.register.receiptHint">Podés omitir este paso</p>
          </div>
          <div id="receipt-preview-wrap" class="receipt-preview-wrap" hidden>
            <img id="receipt-preview" class="receipt-preview" alt="">
            <button type="button" class="receipt-remove-btn" id="btn-receipt-remove">✕</button>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn-cancel" id="btn-confirm-cancel" data-i18n="shopping.register.cancel">Cancelar</button>
        <button type="button" class="btn-confirm" id="btn-confirm-save" data-i18n="shopping.register.confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/shopping-list.js"></script>
</body>
</html>
