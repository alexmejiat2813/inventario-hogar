<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras — Inventario Hogar</title>
  <style>
    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9; color: #1e293b;
      min-height: 100vh; padding-bottom: 4rem;
    }
    button, input { font: inherit; cursor: pointer; }
    img, svg { display: block; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 55%, #3b82f6 100%);
      color: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
    }
    .header-inner {
      max-width: 680px; margin: 0 auto;
      padding: .875rem 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .4rem .7rem;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .8rem; font-weight: 600; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:hover { background: rgba(255,255,255,.25); }

    .header-title-wrap { flex: 1; min-width: 0; }
    .header-inv-name {
      font-size: .7rem; opacity: .75; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-title {
      font-size: 1.05rem; font-weight: 800; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: baseline; gap: .35rem;
    }
    .list-count { font-weight: 500; opacity: .8; font-size: .95rem; }

    .btn-clear {
      padding: .4rem .75rem; flex-shrink: 0;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      font-size: .8rem; font-weight: 600;
      transition: background .15s;
    }
    .btn-clear:hover { background: rgba(255,255,255,.25); }

    /* ── Main ── */
    .main { max-width: 680px; margin: 0 auto; padding: 1rem; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 5rem 2rem; color: #64748b;
    }
    .empty-icon { font-size: 4rem; margin-bottom: 1.25rem; }
    .empty-title { font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: .5rem; }
    .empty-sub   { font-size: .9rem; line-height: 1.6; }

    /* ── All checked ── */
    .all-checked {
      text-align: center; padding: 3rem 2rem; color: #64748b;
    }
    .all-checked-icon { font-size: 3rem; margin-bottom: .75rem; }
    .all-checked-text { font-size: .9rem; font-weight: 500; }

    /* ── Category group ── */
    .cat-group { margin-bottom: 1.25rem; }

    .cat-group-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .4rem .75rem; margin-bottom: .375rem;
      background: #e2e8f0; border-radius: 8px;
    }
    .cat-group-icon { font-size: 1rem; }
    .cat-group-name { font-size: .8rem; font-weight: 700; color: #475569; flex: 1; }
    .cat-group-count {
      font-size: .72rem; font-weight: 700;
      background: #cbd5e1; color: #475569;
      padding: .1rem .45rem; border-radius: 999px;
    }

    .cat-group-items {
      background: white;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      overflow: hidden;
    }

    /* ── List item ── */
    .list-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .875rem 1rem;
      border-bottom: 1px solid #f1f5f9;
      transition: background .12s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: #f8fafc; }

    /* Checkbox button */
    .item-check-btn {
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .check-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2.5px solid #cbd5e1;
      background: white;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }
    .item-check-btn:active .check-circle {
      border-color: #2563eb;
      background: #dbeafe;
    }

    /* Item body */
    .item-body {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: .2rem;
    }
    .item-name {
      font-size: .9375rem; font-weight: 700; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta {
      font-size: .78rem; color: #64748b; line-height: 1.4;
    }
    .item-meta strong { color: #1e293b; }
    .item-needed {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .75rem; font-weight: 700;
      color: #dc2626; margin-top: .1rem;
    }
    .item-needed svg { flex-shrink: 0; }

    /* Update button */
    .item-update-btn {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .45rem .7rem;
      background: #eff6ff; color: #2563eb;
      border: 1.5px solid #bfdbfe; border-radius: 8px;
      font-size: .78rem; font-weight: 600;
      transition: background .15s;
      white-space: nowrap;
    }
    .item-update-btn:hover { background: #dbeafe; }

    /* ── Update qty modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5); backdrop-filter: blur(3px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fade-in .15s ease;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: 1rem; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: white; border-radius: 18px 18px 0 0;
      width: 100%; max-width: 420px;
      padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: slide-up .22s cubic-bezier(.34,1.56,.64,1);
    }
    @media (min-width: 640px) { .modal { border-radius: 18px; animation: scale-in .18s ease; } }
    @keyframes slide-up  { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes scale-in  { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }

    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: .75rem; margin-bottom: 1.25rem;
    }
    .modal-header div { flex: 1; }
    .modal-title   { font-size: 1.05rem; font-weight: 800; }
    .modal-product { font-size: .9rem; color: #64748b; margin-top: .25rem; font-weight: 600; }

    .form-group { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .form-label { font-size: .85rem; font-weight: 600; }
    .input-with-unit {
      display: flex; align-items: center;
      border: 1.5px solid #e2e8f0; border-radius: 8px; overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-with-unit:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .qty-input {
      flex: 1; padding: .6rem .875rem;
      border: none; outline: none;
      font-size: 1.1rem; font-weight: 700;
      color: #1e293b; background: white;
    }
    .unit-label {
      padding: .6rem .875rem .6rem .5rem;
      font-size: .875rem; font-weight: 600;
      color: #64748b; background: white;
      white-space: nowrap;
    }
    .form-hint { font-size: .78rem; color: #64748b; }

    .modal-footer { display: flex; gap: .625rem; margin-top: .25rem; }
    .btn-cancel {
      flex: 1; padding: .6rem;
      background: #f1f5f9; color: #475569;
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-save {
      flex: 2; padding: .6rem;
      background: #2563eb; color: white;
      border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-save:hover  { background: #1d4ed8; }
    .btn-save:disabled { opacity: .6; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; z-index: 300;
      display: flex; flex-direction: column; gap: .5rem;
      pointer-events: none; align-items: flex-end;
    }
    .toast {
      padding: .75rem 1.125rem; border-radius: 10px;
      font-size: .875rem; font-weight: 600; color: white;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
      max-width: 300px; pointer-events: auto;
    }
    .toast--show   { opacity: 1; transform: translateY(0); }
    .toast-success { background: #16a34a; }
    .toast-error   { background: #dc2626; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/inventory" class="btn-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="shopping.back">Volver</span>
      </a>
      <div class="header-title-wrap">
        <div class="header-inv-name" id="inv-name">Inventario</div>
        <div class="header-title">
          🛒 <span data-i18n="shopping.title">Lista de compras</span>
          <span class="list-count" id="list-count"></span>
        </div>
      </div>
      <button class="btn-clear" id="btn-clear" hidden data-i18n="shopping.clear">Limpiar</button>
    </div>
  </header>

  <main class="main">

    <!-- Empty state: no hay críticos -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">✅</div>
      <h2 class="empty-title" data-i18n="shopping.empty.title">¡Todo está bien abastecido!</h2>
      <p class="empty-sub" data-i18n="shopping.empty.sub">
        Ningún producto está por debajo del mínimo.<br>
        El inventario está completo.
      </p>
    </div>

    <!-- Lista de productos críticos -->
    <div id="shopping-list"></div>

  </main>

  <!-- Modal: actualizar cantidad -->
  <div class="modal-overlay" id="update-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" data-i18n="shopping.modal.title">Actualizar cantidad</h2>
          <p class="modal-product" id="update-product-name"></p>
        </div>
      </div>
      <form id="update-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="update-qty" data-i18n="shopping.modal.label">Nueva cantidad actual</label>
          <div class="input-with-unit">
            <input class="qty-input" type="number" id="update-qty"
                   min="0" step="0.01" autocomplete="off" inputmode="decimal">
            <span class="unit-label" id="update-unit"></span>
          </div>
          <span class="form-hint" id="update-min-label"></span>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="btn-update-cancel" data-i18n="shopping.modal.cancel">Cancelar</button>
          <button type="submit" class="btn-save"   id="btn-update-save"   data-i18n="shopping.modal.save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/shopping-list.js"></script>
</body>
</html>
