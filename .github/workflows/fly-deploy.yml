name: Deploy to Fly.io

# Despliega a producción cada vez que master recibe cambios.
# Trabajá en la rama 'develop' (o feature/*) y hacé merge a master para publicar.
on:
  push:
    branches:
      - master

# Evita despliegues solapados si llegan varios push seguidos
concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy app
    needs: test          # no despliega si los tests fallan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
