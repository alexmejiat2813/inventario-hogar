# fly.toml app configuration file generated for inventario-hogar-alex on 2026-06-03T20:20:41-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inventario-hogar-alex'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/inventario.db'
  NODE_ENV = 'production'
  PORT = '8080'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'ih_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

# Cron job: enviar alertas de notificaciones cada hora
[[crons]]
  image = 'curlimages/curl:latest'
  schedule = '0 * * * *'
  command = '/bin/sh -c "curl -X POST https://inventario-hogar-alex.fly.dev/api/notifications/send-alerts -H \"Content-Type: application/json\" -d \"{}\" 2>&1 | head -20"'
