# fly.toml app configuration file generated for inventario-hogar-alex on 2026-06-03T20:20:41-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inventario-hogar-alex'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/inventario.db'
  NODE_ENV = 'production'
  PORT = '8080'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'ih_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

# Cron: enviar alertas de notificaciones cada hora
[[crons]]
  image = 'curlimages/curl:latest'
  schedule = '0 * * * *'
  command = '/bin/sh -c "curl -X POST https://inventario-hogar-alex.fly.dev/api/notifications/send-alerts -H \"Content-Type: application/json\" -d \"{}\" 2>&1 | head -20"'

# Cron: backup SQLite diario a las 03:00 UTC
# Requiere BACKUP_SECRET en fly secrets. Opcional: S3_ENDPOINT, S3_BUCKET,
# S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_REGION para upload a R2/S3.
[[crons]]
  image = 'curlimages/curl:latest'
  schedule = '0 3 * * *'
  command = '/bin/sh -c "curl -s -X POST https://inventario-hogar-alex.fly.dev/api/backup -H \"x-backup-secret: ${BACKUP_SECRET}\" 2>&1 | head -20"'
